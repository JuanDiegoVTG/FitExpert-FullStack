<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Panel Entrenador - Fit Expert</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #3e007b;
            --primary-light: #5a00a8;
            --bg: #0F0F1E;
            --card-bg: #1E1E2E;
            --text: #E0E0E0;
            --border: #2D2D3D;
            --accent: #00d2d3; /* Color distintivo para el entrenador */
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, #1A1A2E 100%);
            color: var(--text);
            padding: 30px;
            margin: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        /* TABLA PRO */
        .table-container { overflow-x: auto; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th {
            background: rgba(62, 0, 123, 0.2);
            color: var(--accent);
            text-align: left;
            padding: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--primary);
        }

        td {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        /* TRUCO PARA LA DESCRIPCIÓN */
        .col-desc {
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* Pone los "..." automáticamente */
            color: #A0A0A0;
        }

        .badge-tipo {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            background: var(--primary);
        }

        /* BOTONES ACCIONES */
        .btn-group { display: flex; gap: 8px; }
        
        .btn-icon {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--border);
            color: white;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-edit { color: #ffc107; border-color: #ffc107; }
        .btn-edit:hover { background: #ffc107; color: black; }
        
        .btn-delete { color: #ff4757; border-color: #ff4757; background: transparent; }
        .btn-delete:hover { background: #ff4757; color: white; }

        .btn-view { color: var(--accent); border-color: var(--accent); }
        .btn-view:hover { background: var(--accent); color: white; }

        .btn-create {
            background: var(--accent);
            color: #0F0F1E;
            padding: 10px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        /* MODAL (Reutilizamos la lógica del cliente) */
        .modal {
            display: none; position: fixed; z-index: 1000;
            top:0; left:0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--card-bg); padding: 30px; border-radius: 15px;
            width: 90%; max-width: 500px; border: 1px solid var(--accent);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-flex">
            <div>
                <h1 style="margin:0;"><i class="fas fa-user-tie" style="color:var(--accent);"></i> Panel de Rutinas</h1>
                <p style="color:var(--text-light); margin:5px 0 0 0;">Gestiona los entrenamientos de tus atletas.</p>
            </div>
            <a href="/entrenador/rutinas/nueva" class="btn-create">
                <i class="fas fa-plus"></i> Nueva Rutina
            </a>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Cliente</th>
                        <th>Nombre Rutina</th>
                        <th>Descripción</th>
                        <th>Tipo</th>
                        <th>Nivel</th>
                        <th>Días</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${rutinas}">
                        <td th:text="${r.id}" style="font-weight: bold; color: var(--accent);"></td>
                        <td>
                            <i class="fas fa-user-circle"></i> 
                            <span th:text="${r.cliente.nombres + ' ' + r.cliente.apellidos}"></span>
                        </td>
                        <td th:text="${r.nombre}" style="color: white; font-weight: 500;"></td>
                        <td class="col-desc" th:text="${r.descripcion}"></td>
                        <td><span class="badge-tipo" th:text="${r.tipo}">IA</span></td>
                        <td th:text="${r.nivelDificultad}"></td>
                        <td th:text="${r.duracionSemanas}"></td>
                        <td>
                            <div class="btn-group">
                                <button class="btn-icon btn-view" 
                                        th:data-nombre="${r.nombre}"
                                        th:data-desc="${r.descripcion}"
                                        onclick="verDetalle(this)" title="Vista Rápida">
                                    <i class="fas fa-eye"></i>
                                </button>
                                
                                <a th:href="@{/entrenador/rutinas/{id}/editar(id=${r.id})}" class="btn-icon btn-edit">
                                    <i class="fas fa-edit"></i>
                                </a>

                                <form th:action="@{/entrenador/rutinas/{id}/eliminar(id=${r.id})}" method="post" onsubmit="return confirm('¿Borrar rutina?');">
                                    <button type="submit" class="btn-icon btn-delete">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div style="margin-top: 25px; display: flex; justify-content: space-between;">
            <a href="/dashboard" style="color: var(--text-light); text-decoration: none;"><i class="fas fa-chevron-left"></i> Volver</a>
            <form th:action="@{/logout}" method="post">
                <button type="submit" style="background:none; border:none; color:#ff4757; cursor:pointer;">Cerrar Sesión</button>
            </form>
        </div>
    </div>

    <div id="modalDetalle" class="modal">
        <div class="modal-content">
            <h2 id="mNombre" style="color:var(--accent); margin-top:0;"></h2>
            <hr border="0" style="border-top:1px solid var(--border); margin:15px 0;">
            <div id="mDesc" style="line-height: 1.6; color: #E0E0E0;"></div>
            <button onclick="cerrar()" style="margin-top:20px; width:100%; padding:10px; border-radius:8px; border:none; background:var(--primary); color:white; cursor:pointer;">Cerrar</button>
        </div>
    </div>

    <script>
        function verDetalle(btn) {
            document.getElementById('mNombre').innerText = btn.getAttribute('data-nombre');
            document.getElementById('mDesc').innerText = btn.getAttribute('data-desc');
            document.getElementById('modalDetalle').style.display = 'flex';
        }
        function cerrar() { document.getElementById('modalDetalle').style.display = 'none'; }
    </script>
</body>
</html>
