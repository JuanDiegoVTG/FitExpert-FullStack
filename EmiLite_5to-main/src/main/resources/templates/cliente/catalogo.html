<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Entrenadores - Fit Expert</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #060e1a;
            --bg-sidebar: #1e293b;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #3169B2;
            --accent: #00D4FF;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }
        

        /* BOTÓN MENÚ MÓVIL */
        .mobile-toggle {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2000;
            background: var(--primary);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 10px;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* ---------- LOGO SIDEBAR FIT EXPERT ---------- */

        .logo-container {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--accent);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.35);
            background: white;
            transition: var(--transition);
        }

        .brand-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .brand-text {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.25);
        }

        .brand:hover .logo-container {
            transform: scale(1.08) rotate(-5deg);
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.5);
        }

        .brand:hover .brand-text {
            filter: brightness(1.15);
        }

        /* SIDEBAR RESPONSIVE */
        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--border-color);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 1500;
            transition: var(--transition);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 800;
            color: white;
            margin-bottom: 3rem;
            text-decoration: none;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 14px 20px;
            color: #cbd5e1 !important;
            text-decoration: none;
            border-radius: 15px;
            margin-bottom: 8px;
            font-size: 1.05rem;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-left: 4px solid transparent;
            position: relative;
            overflow: hidden;
        }

        /* Hover premium */
        .nav-link:hover {
            color: #ffffff !important;
            background: rgba(49, 105, 178, 0.12);
            transform: translateX(10px);
            border-left: 4px solid var(--accent);
            box-shadow: 10px 0 20px rgba(0, 212, 255, 0.08);
        }

        /* Página activa */
        .nav-link.active {
            background: linear-gradient(
                90deg,
                rgba(49, 105, 178, 0.2),
                transparent
            );
            color: #ffffff !important;
            border-left: 4px solid var(--accent);
            font-weight: 700;
        }
        /* Íconos */
        .nav-link i {
            font-size: 1.2rem;
            color: var(--text-muted);
            transition: all 0.3s ease;
        }

        /* Animación del ícono */
        .nav-link:hover i,
        .nav-link.active i {
            color: var(--accent);
            transform: scale(1.2) rotate(-5deg);
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        /* Brillo que recorre el botón */
        .nav-link::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255,255,255,0.05),
                transparent
            );
            transition: 0.5s;
        }
        
        .nav-link:hover::after {
    left: 100%;
}
        /* CONTENIDO PRINCIPAL */
        .main-content { 
            margin-left: 280px; 
            flex: 1; 
            padding: 2.5rem; 
            width: 100%;
            transition: var(--transition);
            
        }
        

        .top-dark-section {
            background: linear-gradient(135deg, rgba(49, 105, 178, 0.2), rgba(0, 212, 255, 0.1));
            padding: 40px;
            border-radius: 24px;
            margin-bottom: 2rem;
            border: 1px solid var(--border-color);
           
            
        }

        .grid-rutinas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .rutina-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            overflow: hidden;
            transition: var(--transition);
        }

        .rutina-card:hover { transform: translateY(-10px); border-color: var(--accent); }

        .btn-contratar {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            transition: var(--transition);
        }

        .btn-contratar:hover { background: var(--accent); color: var(--bg-body); }

        /* --- MEDIA QUERIES (MAGIA RESPONSIVE) --- */
        @media (max-width: 992px) {
            .mobile-toggle { display: block; }
            .sidebar { left: -280px; }
            .sidebar.active { left: 0; }
            .main-content { margin-left: 0; padding: 1.5rem; padding-top: 5rem; }
            .top-dark-section { padding: 25px; }
            .top-dark-section h1 { font-size: 1.8rem; }
        }

        @media (max-width: 576px) {
            .grid-rutinas { grid-template-columns: 1fr; }
        }

        /* Modal dark style */
        .modal-content { background: var(--bg-sidebar); color: white; border: 1px solid var(--border-color); border-radius: 24px; }
        .btn-close { filter: invert(1); }
    </style>
</head>
<body>

    <button class="mobile-toggle" onclick="toggleSidebar()">
        <i class="fas fa-bars" id="menuIcon"></i>
    </button>

    <nav class="sidebar" id="sidebar">
        <a href="/dashboard" class="brand d-flex align-items-center gap-3 mb-5 text-decoration-none">
            <div class="logo-container">
                <img th:src="@{/images/logofitexpert.jpeg}" 
                    alt="Fit Expert Logo" 
                    class="brand-img">
            </div>

            <span class="brand-text">
                FIT <span style="color: var(--accent);">EXPERT</span>
            </span>
        </a>

        <div class="nav-group">

            <label class="small text-uppercase mb-3 d-block"
                style="color: var(--accent) !important;">
                Menú
            </label>
            <a href="/dashboard" class="nav-link">
                <i class="fas fa-th-large"></i> <span>Dashboard</span>
            </a>
            <a href="/cliente/rutinas" class="nav-link">
                <i class="fas fa-dumbbell"></i> <span>Mis Rutinas</span>
            </a>
            <a href="/catalogo" class="nav-link active">
                <i class="fas fa-chalkboard-teacher"></i> <span>Entrenadores</span>
            </a>
        </div>

        <form th:action="@{/logout}" method="post" class="mt-auto">
            <button type="submit" class="btn btn-outline-danger w-100 fw-bold border-2"><i class="fas fa-power-off"></i> Salir</button>
        </form>
    </nav>

    <div class="main-content">
        <section class="top-dark-section text-center">
            <h1>Entrenadores Élite</h1>
            <p style="color: white;">Lleva tu entrenamiento al siguiente nivel con profesionales certificados.</p>
        </section>

        <section class="mb-5">
            <div class="input-group" style="max-width: 500px; margin: 0 auto;">
                <span class="input-group-text bg-dark border-secondary text-muted"><i class="fas fa-search"></i></span>
                <input type="text" id="searchBar" class="form-control bg-dark text-white border-secondary" placeholder="Buscar por nombre o especialidad...">
            </div>
        </section>

        <div class="grid-rutinas">
            <div th:if="${#lists.isEmpty(entrenadores)}" class="text-center w-100">
                <p>No hay entrenadores disponibles en este momento.</p>
            </div>

            <div class="rutina-card" th:each="entrenador : ${entrenadores}">
                <img src="/images/entrenador2.jpg" alt="Entrenador" style="width:100%; height: 250px; object-fit: cover;">
                <div style="padding: 25px;">
                    <h3 th:text="${entrenador.nombres + ' ' + entrenador.apellidos}" style="font-weight: 800; margin-bottom: 5px;"></h3>
                    <p class="text-info small mb-3"><i class="fas fa-certificate"></i> Entrenador Verificado</p>
                    <p th:text="${entrenador.descripcion != null ? entrenador.descripcion : 'Sin descripción disponible.'}" style="color: var(--text-muted); font-size: 0.9rem; line-height: 1.6;"></p>
                    
                    <button type="button" class="btn-contratar mt-3" 
                            data-bs-toggle="modal" data-bs-target="#modalEntrenador"
                            th:attr="data-nombre=${entrenador.nombres + ' ' + entrenador.apellidos},
                                     data-descripcion=${entrenador.descripcion},
                                     data-id=${entrenador.id},
                                     data-precio=${entrenador.cvScore != null ? entrenador.cvScore : 50000}">
                        Ver Perfil y Contratar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalEntrenador" tabindex="-1" data-bs-focus="false">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow-lg">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold">Perfil del Entrenador</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center p-4">
                    <img id="modalFoto" src="/images/entrenador2.jpg" style="width:150px; height:150px; border-radius:50%; object-fit:cover; border: 4px solid var(--primary); margin-bottom:20px;">
                    <h4 id="modalNombre" class="fw-bold"></h4>
                    <p id="modalDescripcion" class="text-muted mb-4"></p>
                    <h3 id="modalPrecio" class="text-info fw-bold"></h3>
                </div>
                <div class="modal-footer border-0 justify-content-center pb-4">
                    <button type="button" id="btnConfirmarPago" class="btn btn-primary px-5 py-3 fw-bold rounded-pill" onclick="procesarPagoMercadoPago()">
                        Contratar Ahora con Mercado Pago
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    <script>
        // Función para el menú móvil
        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("active");
            const icon = document.getElementById("menuIcon");
            icon.classList.toggle("fa-bars");
            icon.classList.toggle("fa-times");
        }

        // Tu lógica de Mercado Pago y Búsqueda se mantiene igual aquí...
        // (Pégala debajo de esta línea para que funcione)
        const mp = new MercadoPago('TEST-fec0febe-f2ed-497a-bace-576313d7d822', { locale: 'es-CO' });
        
        
       // BUSCADOR INTELIGENTE POR NOMBRE + CUALQUIER TEXTO DE DESCRIPCIÓN
        const searchBar = document.getElementById("searchBar");
        const cards = document.querySelectorAll(".rutina-card");

        searchBar.addEventListener("input", function () {
            const query = this.value.toLowerCase().trim();

            cards.forEach(card => {

                // Nombre del entrenador
                const nombre = card.querySelector("h3")?.innerText.toLowerCase() || "";

                // Obtener TODOS los párrafos de la card
                const textosDescripcion = Array.from(
                    card.querySelectorAll("p")
                )
                .map(p => p.innerText.toLowerCase())
                .join(" ");

                // También busca en todo el texto visible de la tarjeta
                const textoCompleto = card.innerText.toLowerCase();

                const coincide =
                    nombre.includes(query) ||
                    textosDescripcion.includes(query) ||
                    textoCompleto.includes(query);

                card.style.display = coincide ? "" : "none";
            });
        });

        // Llenar Modal
        let entrenadorIdActual, nombreEntrenadorActual, precioActual;
        document.getElementById("modalEntrenador").addEventListener("show.bs.modal", (e) => {
            const btn = e.relatedTarget;
            entrenadorIdActual = btn.getAttribute("data-id");
            nombreEntrenadorActual = btn.getAttribute("data-nombre");
            precioActual = btn.getAttribute("data-precio") || 50000;
            descripcionActual = btn.getAttribute("data-descripcion");
            
            document.getElementById("modalNombre").innerText = nombreEntrenadorActual;
            document.getElementById("modalDescripcion").innerText = descripcionActual || "Sin descripción";
            document.getElementById("modalPrecio").innerText = "$" + precioActual + " COP";
        });

        function procesarPagoMercadoPago() {
            const btn = document.getElementById("btnConfirmarPago");
            btn.disabled = true; btn.innerText = "Conectando...";

            fetch("/catalogo/crear-preferencia", { 
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    entrenadorId: entrenadorIdActual,
                    titulo: "Suscripción: " + nombreEntrenadorActual,
                    precio: parseFloat(precioActual)
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.id) {
                    mp.checkout({ preference: { id: data.id }, autoOpen: true });
                } else {
                    window.location.href = data.init_point;
                }
                btn.disabled = false; btn.innerText = "Contratar Ahora";
            })
            .catch(() => {
                alert("Error al procesar pago.");
                btn.disabled = false; btn.innerText = "Contratar Ahora";
            });
        }

        
        
    </script>
</body>
</html>
