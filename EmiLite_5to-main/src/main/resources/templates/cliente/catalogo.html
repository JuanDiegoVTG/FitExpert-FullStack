<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Entrenadores- Fit Expert</title>
    <link rel="stylesheet" th:href="@{/css/estilo.css}">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    
    <style>
        :root {
            --bg-body: #111a30;
            --bg-sidebar: #1e2f62f6;
            --card-bg: rgba(20, 47, 130, 0.35);
            --primary: #6079C5;
            --primary-light: #8CA0DC;
            --primary-dark: #2444A5;
            --accent: #8CA0DC;
            --text-main: #f1f5ff;
            --text-muted: #a9b4d0;
            --border-color: rgba(140, 160, 220, 0.15);
            --primary-glow: rgba(96, 121, 197, 0.45);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg-body); /* Ajustado para que combine con el sidebar */
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--border-color);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 800;
            color: white;
            margin-bottom: 3rem;
            text-decoration: none;
        }

        .brand i {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text; 
            background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        .nav-group { margin-bottom: 2rem; }
        .nav-group label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 1rem;
            display: block;
            padding-left: 0.75rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.85rem 1rem;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 12px;
            margin-bottom: 0.5rem;
            transition: var(--transition);
            font-weight: 500;
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(96, 121, 197, 0.15);
            color: white;
        }

        .logout-btn {
            margin-top: auto;
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .main-content { margin-left: 280px; flex: 1; padding: 2.5rem; }

        .top-dark-section {
            background: linear-gradient(135deg, rgba(33, 52, 106, 0.816), rgba(60, 95, 198, 0.914));
            padding: 40px;
            text-align: center;
            border-radius: 20px;
            margin-bottom: 2rem;
        }

        .grid-rutinas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 2rem;
        }

        .rutina-card {
            background: rgba(33, 52, 106, 0.816);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            transition: var(--transition);
        }

        .btn-contratar {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
        }

        .filter-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 2.5rem;
        }

        .filter-form {
            display: flex;
            gap: 1rem;
            align-items: end;
        }

        .filter-input {
            padding: 8px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: white;
            color: var(--bg-body);
        }

        /* Estilos del Modal para que se vea bien en fondo oscuro */
        .modal-content {
            background-color: var(--bg-body);
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }
        .modal-header { border-bottom: 1px solid var(--border-color); }
        .modal-footer { border-top: 1px solid var(--border-color); }
        .btn-close { filter: invert(1); }
    </style>
</head>
<body>

    <nav class="sidebar">
        <a href="#" class="brand">
            <i class="fas fa-bolt"></i>
            <span>FIT EXPERT</span>
        </a>

        <div class="nav-group">
            <label>Menu Principal</label>
            <a href="/dashboard" class="nav-link">
                <i class="fas fa-th-large"></i> <span>Dashboard</span>
            </a>
            <a href="/cliente/rutinas" class="nav-link">
                <i class="fas fa-dumbbell"></i> <span>Mis Rutinas</span>
            </a>
            <a href="/catalogo" class="nav-link active">
                <i class="fas fa-chalkboard-teacher"></i> <span>Entrenadores</span>
            </a>
        </div>

        <form th:action="@{/logout}" method="post" style="margin-top: auto;">
            <button type="submit" class="btn logout-btn w-100">
                <i class="fas fa-power-off"></i> <span>Cerrar Sesión</span>
            </button>
        </form>
    </nav>

    <div class="main-content">
        <section class="top-dark-section">
            <div class="header-section">
                <h1>Entrenadores - Fit Expert</h1>
                <p>Encuentra el entrenador ideal para ti</p>
            </div>
        </section>

        <section class="filter-section">
            <form th:action="@{/catalogo}" method="get" class="filter-form">
                <div class="d-flex flex-column flex-grow-1">
                    <label class="small mb-1">Buscar por nombre o especialidad:</label>
                    <input type="text" id="searchBar" name="keyword" class="filter-input" th:value="${keyword}">
                </div>
                <button type="submit" class="btn-contratar">Buscar</button>
            </form>
        </section>

        <section class="content-light-section">
            <div class="grid-rutinas">
                <div th:if="${#lists.isEmpty(entrenadores)}" class="text-center w-100">
                    <p>No hay entrenadores disponibles.</p>
                </div>

                <div class="rutina-card" th:each="entrenador : ${entrenadores}">
                    <img src="/images/entrenador2.jpg" alt="Entrenador" style="width:100%; height: 200px; object-fit: cover;">
                    <div style="padding:20px;">
                        <h3 th:text="${entrenador.nombres} + ' ' + ${entrenador.apellidos}"></h3>
                        <h2 style="font-size:1.2rem; color: var(--primary-light);">Entrenador Certificado</h2>
                        <p th:text="${entrenador.descripcion != null ? entrenador.descripcion : 'Sin descripción'}"></p>
                        <br>
                        <button type="button" class="btn-contratar" 
                                data-bs-toggle="modal" data-bs-target="#modalEntrenador"
                                th:attr="data-nombre=${entrenador.nombres + ' ' + entrenador.apellidos},
                                         data-descripcion=${entrenador.descripcion},
                                         data-id=${entrenador.id},
                                         data-precio=${entrenador.cvScore != null ? entrenador.cvScore : 50000}">
                            Ver perfil
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <div class="modal fade" id="modalEntrenador" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Perfil del Entrenador</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center">
                    <img id="modalFoto" src="/images/entrenador2.jpg" style="width:120px; height:120px; border-radius:50%; object-fit:cover; margin-bottom:15px;">
                    <h4 id="modalNombre"></h4>
                    <p id="modalDescripcion"></p>
                    <h5 id="modalPrecio" class="text-primary"></h5>
                </div>
                <div class="modal-footer">
                    <button type="button" id="btnConfirmarPago" class="btn btn-primary" onclick="procesarPagoMercadoPago()">
                        Contratar Ahora
                    </button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://sdk.mercadopago.com/js/v2"></script>
    <script>
    // 1. Inicializa MercadoPago con tu PUBLIC_KEY (La de prueba o producción)
    const mp = new MercadoPago('TEST-fec0febe-f2ed-497a-bace-576313d7d822', {
        locale: 'es-CO' // Ajusta el idioma y país según corresponden
    });

    // 2. Lógica de búsqueda local (Filtra las cards mientras escribes)
    const searchBar = document.getElementById("searchBar");
    if (searchBar) {
        searchBar.addEventListener("keyup", function() {
            const query = searchBar.value.toLowerCase().trim();
            document.querySelectorAll(".rutina-card").forEach(card => {
                const text = card.innerText.toLowerCase();
                card.style.display = text.includes(query) ? "" : "none";
            });
        });
    }

    // 3. Variables globales para capturar al entrenador seleccionado
    let entrenadorIdActual = null;
    let nombreEntrenadorActual = null;
    let precioActual = 0;

    // 4. Lógica para llenar el Modal con los datos de la card
    const modal = document.getElementById("modalEntrenador");
    if (modal) {
        modal.addEventListener("show.bs.modal", function (event) {
            const button = event.relatedTarget; // El botón "Ver perfil" que se clickeó
            
            // Capturamos los datos que vienen en los th:attr del botón
            entrenadorIdActual = button.getAttribute("data-id");
            nombreEntrenadorActual = button.getAttribute("data-nombre");
            precioActual = button.getAttribute("data-precio") || 50000;

            // Llenamos el contenido visual del modal
            document.getElementById("modalNombre").innerText = nombreEntrenadorActual;
            document.getElementById("modalDescripcion").innerText = button.getAttribute("data-descripcion") || "Sin descripción disponible.";
            document.getElementById("modalPrecio").innerText = "$" + precioActual + " / sesión";
            
            // Si tienes campo de foto en el modal:
            const foto = button.getAttribute("data-foto") || "/images/entrenador2.jpg";
            const fotoElement = document.getElementById("modalFoto");
            if(fotoElement) fotoElement.src = foto;
        });
    }

    // 5. Lógica de Mercado Pago MODAL (Llamada al Controller)
    function procesarPagoMercadoPago() {
        if (!entrenadorIdActual) {
            alert("Error: No se pudo identificar al entrenador.");
            return;
        }

        const btn = document.getElementById("btnConfirmarPago");
        btn.disabled = true;
        btn.innerText = "Cargando Mercado Pago...";

        fetch("/catalogo/crear-preferencia", { 
            method: "POST",
            headers: { 
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                entrenadorId: entrenadorIdActual,
                titulo: "Suscripción: " + nombreEntrenadorActual,
                precio: parseFloat(precioActual)
            })
        })
        .then(res => {
            if (!res.ok) throw new Error("Error en la respuesta del servidor");
            return res.json();
        })
        .then(data => {
            // AQUÍ ESTÁ EL CAMBIO: En vez de redirigir, abrimos el modal
            if (data.id) { // El JSON del back ahora debe retornar el "id" de la preferencia, no solo el "init_point"
                mp.checkout({
                    preference: {
                        id: data.id // El ID que te devolvió Spring Boot
                    },
                    autoOpen: true // Abre el modal inmediatamente
                });
                
                // Restauramos el botón por si el usuario cierra el modal
                btn.disabled = false;
                btn.innerText = "Contratar Ahora";
            } else if (data.init_point) {
                // Si tu backend solo manda el init_point, intentamos abrir el modal igual (algunas versiones viejas lo permitían)
                // Pero lo ideal es que devuelvas el ID de la preferencia.
                 window.location.href = data.init_point;
            } else {
                throw new Error(data.error || "No se recibió el ID de la preferencia");
            }
        })
        .catch(error => {
            console.error("Error en el pago:", error);
            alert("Hubo un problema al cargar el pago. Revisa la consola.");
            btn.disabled = false;
            btn.innerText = "Contratar Ahora";
        });
    }
</script>
</body>
</html>
