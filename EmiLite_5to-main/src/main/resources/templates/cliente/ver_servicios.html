<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Ver Servicios - FIT EXPERT</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/estilo.css}">
</head>
<body>
    <div class="container">
        <div class="logo">
            <img th:src="@{/images/logofitexpert.jpeg}" alt="Emi-Lite" style="height:110px; width:120px; display:inline-block; vertical-align:middle;" />
                   <!-- Icono representativo para servicios -->
            <span class="logo-text"></span>
        </div>

        <h2>Servicios Disponibles</h2>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Descripción</th>
                    <th>Duración (min)</th>
                    <th>Precio (COP)</th>
                    <th>Activo</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="servicio : ${servicios}">
                    <td th:text="${servicio.id}"></td>
                    <td th:text="${servicio.nombre}"></td>
                    <td th:text="${servicio.descripcion}"></td>
                    <td th:text="${servicio.duracionMinutos}"></td>
                    <td th:text="|${#numbers.formatDecimal(servicio.precio, 1, 2)} COP|"></td> <!-- Formateado como COP -->
                    <td th:text="${servicio.activo ? 'Sí' : 'No'}"></td>
                    <td>
                     <a th:href="@{/pagos/cliente/pagar/{id}(id=${servicio.id})}" 
                    class="btn-purple">
                    Pagar
                    </a>
                    </td>
                </tr>
            </tbody>
        </table>

        <!-- Mensaje si no hay servicios -->
        <div th:if="${#lists.isEmpty(servicios)}" class="no-data">
            <p>No hay servicios disponibles en este momento.</p>
        </div>

        <span sec:authorize="hasRole('ADMIN')">
            <a href="/admin/dashboard" class="back-link">Volver al Panel</a>
        </span>
        <span sec:authorize="hasRole('ENTRENADOR')">
            <a href="/entrenador/dashboard" class="back-link">Volver al Panel</a>
        </span>
        <span sec:authorize="hasRole('CLIENTE')">
            <a href="/cliente/dashboard" class="back-link">Volver al Panel</a>
        </span>
        <span sec:authorize="isAnonymous() or !hasAnyRole('ADMIN','ENTRENADOR','CLIENTE')">
            <a href="/dashboard" class="back-link">Volver al Panel</a>
        </span>

        <!-- Formulario para cerrar sesión -->
        <form th:action="@{/logout}" method="post" style="display: inline;">
            <input type="hidden" name="${_csrf.parameterName}" value="${_csrf.token}"/>
            <button type="submit" class="logout-link">Cerrar sesión</button>
        </form>
    </div>
</body>
</html>
