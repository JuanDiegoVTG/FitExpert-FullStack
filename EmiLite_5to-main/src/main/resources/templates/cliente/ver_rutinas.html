<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Mis Rutinas - Emi-Lite</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #3e007b;
            --secondary: #0F0F1E;
            --card-bg: #1E1E2E;
            --text: #E0E0E0;
            --border: #2D2D3D;
            --gold: #FFD700;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0F0F1E 0%, #1A1A2E 100%);
            color: var(--text);
            padding: 40px;
        }

        .grid-rutinas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .rutina-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 25px;
            position: relative;
            transition: transform 0.3s ease;
        }

        .rutina-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .fav-icon {
            position: absolute;
            top: 20px;
            right: 20px;
            color: var(--gold);
            font-size: 1.5rem;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
        }

        .rutina-card h3 {
            margin-top: 0;
            color: white;
            font-size: 1.4rem;
            padding-right: 30px;
        }

        .badge {
            background-color: var(--primary);
            color: white;
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 0.8rem;
            margin-bottom: 15px;
            display: inline-block;
        }

        .descripcion {
            color: #A0A0A0;
            font-size: 0.95rem;
            line-height: 1.5;
            margin: 15px 0;
        }

        .btn-ver {
            display: block;
            text-align: center;
            background: transparent;
            border: 1px solid var(--primary);
            color: white;
            padding: 10px;
            border-radius: 8px;
            text-decoration: none;
            margin-top: 10px;
        }

        .btn {
            margin: 20px;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: none;
            font-size: 1rem;
        }

        .btn-volver {
            background-color: transparent;
            color: var(--text-light);
            border: 1px solid var(--border);
        }

        .btn-volver:hover {
            background-color: rgba(255,255,255,0.05);
            color: white;
        }
    </style>
</head>
<body>

    <h1><i class="fas fa-running"></i> Mis Rutinas Guardadas</h1>
    <p>Aquí puedes ver tu historial de entrenamientos y tus favoritas.</p>

    <div class="grid-rutinas">
        <div th:each="r : ${rutinas}" class="rutina-card">
            
            <i th:if="${r.es_favorita}" class="fas fa-star fav-icon" title="Favorita"></i>

            <span class="badge" th:text="${r.tipo}">IA</span>
            <h3 th:text="${r.nombre}">Nombre de la Rutina</h3>
            
            <div class="descripcion">
                <p><i class="fas fa-signal"></i> Nivel: <span th:text="${r.nivelDificultad}">Media</span></p>
                <p><i class="fas fa-calendar-day"></i> <span th:text="${r.duracionSemanas}">4</span> días por semana</p>
                <hr style="border: 0; border-top: 1px solid var(--border); margin: 10px 0;">
                <p th:text="${r.descripcion}">Ejercicios...</p>
            </div>

            <a href="#" class="btn-ver">Ver Detalles Completos</a>
                
                <form th:action="@{/api/rutinas/{id}/eliminar(id=${r.id})}" method="post" onsubmit="return confirm('¿Seguro que quieres eliminar esta rutina?');">
                    <button type="submit" class="btn-ver" style="border-color: #ff4757; color: #ff4757; background: transparent; cursor: pointer;">
                        <i class="fas fa-trash"></i>
                    </button>
                </form>
        </div>

    <div th:if="${rutinas.empty}" style="text-align: center; margin-top: 50px;">
        <p>Aún no tienes rutinas. ¡Genera tu primera rutina con IA en el panel!</p>
        <a href="/api/rutina-real" style="color: var(--primary); text-decoration: none;">Ir al generador →</a>
    </div>

    <div class="actions">
    <a href="/cliente/dashboard" class="btn btn-volver">
        <i class="fas fa-arrow-left"></i> Volver al Panel
    </a>

</body>
</html>
