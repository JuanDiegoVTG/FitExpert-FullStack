<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Mis Rutinas - FIT EXPERT</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/estilo.css}">

    <style>
        /* 1. ARREGLO DEL FONDO Y BODY */
        body.page-rutinas {
            background-color: #0b1f3a !important; /* Azul oscuro profundo */
            display: block !important;
            padding: 0;
            margin: 0;
        }

        .page-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* 2. HEADER ARREGLADO (CON LOGO) */
        .header-section {
            text-align: center;
            margin-bottom: 50px;
            position: relative;
        }

        .header-logo {
            height: 80px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 2px solid var(--primary);
            transition: transform 0.3s ease;
        }
        
        .header-logo:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(49, 105, 178, 0.4);
        }

        .header-section h1 {
            color: #ffffff !important; /* Blanco puro para que resalte */
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .header-section p {
            color: #AFC6E9 !important; /* Azul clarito */
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* 3. GRID DE TARJETAS (EL QUE YA TE GUSTA) */
        .grid-rutinas {
            display: grid !important;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)) !important;
            gap: 25px !important;
            margin-top: 30px !important;
        }

        .rutina-card {
            background: linear-gradient(135deg, rgba(33, 52, 106, 0.95), rgba(60, 95, 198, 0.95)) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 20px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 260px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .rutina-card:hover {
            transform: translateY(-8px);
            border-color: #00D4FF !important; /* Cyan al pasar el mouse */
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.2);
        }

        /* ESTILOS INTERNOS DE LA TARJETA */
        .fav-icon { position: absolute; top: 20px; right: 20px; color: #FFD700; }
        
        .badge {
            background-color: #3169B2;
            color: white; padding: 5px 12px;
            border-radius: 8px; font-size: 0.7rem;
            font-weight: 800; margin-bottom: 15px;
            display: inline-block;
        }

        .rutina-card h3 { color: white; font-size: 1.4rem; margin-bottom: 15px; }

        .descripcion-previa p {
            color: #EAF2FB;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        /* BOTONES */
        .card-footer {
            display: flex; gap: 10px; margin-top: 20px;
        }

        .btn-detalles {
            flex-grow: 1; background: #3169B2; color: white;
            padding: 12px; border-radius: 10px; border: none;
            font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        
        .btn-detalles:hover { background: #00D4FF; color: #0b1f3a; }

        .btn-delete {
            background: rgba(255, 255, 255, 0.05); color: #ff4d4d;
            padding: 10px; border-radius: 10px; border: 1px solid rgba(255, 77, 77, 0.2);
            cursor: pointer; transition: 0.3s;
        }

        .btn-delete:hover { background: #ff4d4d; color: white; }

        /* MODAL */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px);
            z-index: 2000; justify-content: center; align-items: center;
        }

        .modal-content {
            background: #0b1f3a; padding: 35px; border-radius: 25px;
            width: 90%; max-width: 500px; border: 1px solid #3169B2;
            color: white; position: relative;
        }

        .actions { margin-top: 50px; text-align: center; }
        .btn-volver {
            color: #AFC6E9; text-decoration: none; font-weight: 600;
            display: inline-flex; align-items: center; gap: 8px;
        }

        @keyframes slideIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>

<body class="page-rutinas">
<div class="page-container">
    
    <div class="header-section">
        <img th:src="@{/images/logofitexpert.jpeg}" class="header-logo" alt="Fit Expert Logo">
        <h1>Mis Rutinas Guardadas</h1>
        <p>Gestiona tus entrenamientos y sigue tu progreso personalizado.</p>
    </div>

    <div class="grid-rutinas">
        <div th:each="rutina : ${rutinas}" class="rutina-card">
            <i class="fas fa-star fav-icon"></i>

            <div class="card-content">
                <span class="badge" th:text="${rutina.tipo}">GENERADA POR IA</span>
                <h3 th:text="${rutina.nombre}">Nombre de la Rutina</h3>
                
                <div class="descripcion-previa">
                    <p><i class="fas fa-dumbbell" style="color: #00D4FF;"></i> Nivel: <span th:text="${rutina.nivelDificultad}">Media</span></p>
                    <p><i class="fas fa-calendar-alt" style="color: #00D4FF;"></i> <span th:text="${rutina.duracionSemanas}">4</span> días / semana</p>
                </div>
            </div>

            <div class="card-footer">
                <button class="btn-detalles" 
                        th:data-nombre="${rutina.nombre}"
                        th:data-descripcion="${rutina.descripcion}"
                        th:data-nivel="${rutina.nivelDificultad}"
                        th:data-duracion="${rutina.duracionSemanas}"
                        onclick="capturarYMostrar(this)">
                    Ver Detalles
                </button>

                <form th:action="@{/api/rutinas/{id}/eliminar(id=${rutina.id})}" method="post" 
                      onsubmit="return confirm('¿Seguro que quieres borrarla?');">
                    <button type="submit" class="btn-delete">
                        <i class="fas fa-trash"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>


    <div class="actions">
        <a href="/dashboard" class="btn-volver">
            <i class="fas fa-arrow-left"></i> Volver al Panel
        </a>
    </div>

    <div id="modalRutina" class="modal-overlay">
        <div class="modal-content">
            <span onclick="cerrarModal()" style="position:absolute; top:20px; right:20px; cursor:pointer; font-size:24px;">&times;</span>
            <div style="color: #00D4FF; font-weight: bold; font-size: 0.8rem; margin-bottom: 10px;">
                <i class="fas fa-robot"></i> FIT EXPERT INTELLIGENCE
            </div>
            <h2 id="modalTitle">Nombre</h2>
            <div id="modalStats" style="display:flex; gap:20px; margin: 20px 0;">
                <div><small style="color:#AFC6E9">NIVEL</small><br><b id="modalLevel"></b></div>
                <div><small style="color:#AFC6E9">DÍAS</small><br><b id="modalDuration"></b></div>
            </div>
            <ul id="modalExercisesList" style="list-style: none; padding: 0;"></ul>
        </div>
    </div>

    <script>
        function abrirModal(nombre, descripcion, nivel, duracion) {
            document.getElementById('modalTitle').innerText = nombre;
            document.getElementById('modalLevel').innerText = nivel;
            document.getElementById('modalDuration').innerText = duracion + " / sem";
            
            const list = document.getElementById('modalExercisesList');
            list.innerHTML = "";
            
            descripcion.split(',').forEach(ex => {
                if(ex.trim() !== "") {
                    const li = document.createElement('li');
                    li.innerHTML = `<i class="fas fa-check-circle" style="color: #4cd137; margin-right: 10px;"></i> ${ex.trim()}`;
                    li.style.padding = "10px";
                    li.style.background = "rgba(255,255,255,0.05)";
                    li.style.borderRadius = "8px";
                    li.style.marginBottom = "5px";
                    list.appendChild(li);
                }
            });
            document.getElementById('modalRutina').style.display = 'flex';
        }

        function capturarYMostrar(btn) {
            abrirModal(
                btn.getAttribute('data-nombre'), 
                btn.getAttribute('data-descripcion'),
                btn.getAttribute('data-nivel'),
                btn.getAttribute('data-duracion')
            );
        }

        function cerrarModal() {
            document.getElementById('modalRutina').style.display = 'none';
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById('modalRutina')) cerrarModal();
        }
    </script>
</div>
</body>
</html>
