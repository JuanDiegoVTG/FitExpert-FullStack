<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chat FitExpert - Mi Entrenador</title>
    <link rel="stylesheet" th:href="@{/css/estilo.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background: url("/images/klipartz2.png"), #0b1f3a; 
            background-size: cover;
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Contenedor Principal estilo Glassmorphism */
        .messenger-container {
            display: flex;
            height: 85vh;
            width: 100%;
            max-width: 1200px;
            margin: 20px;
            background-color: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* BARRA LATERAL (Izquierda - 30%) */
        .sidebar {
            width: 30%;
            background: rgba(17, 26, 48, 0.9);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            background: rgba(26, 38, 64, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-back {
            align-self: flex-start;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-back:hover { color: #00D4FF; }

        .sidebar-header h3 { color: #00D4FF; margin: 0; font-size: 1.2rem; text-align: center; }

        .contacts-list { flex: 1; overflow-y: auto; }

        .contact-card {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-left: 5px solid #00D4FF;
            cursor: default;
        }

        .contact-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #00D4FF, #3169B2);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 4px 10px rgba(0, 212, 255, 0.3);
        }

        /* ÁREA DE CHAT (Derecha - 70%) */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: transparent;
        }

        .chat-header {
            padding: 20px 25px;
            background: rgba(26, 38, 64, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chat-header h4 { color: white; margin: 0; }

        #chat-box {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: rgba(15, 23, 42, 0.4);
        }

        /* Burbujas de Mensaje */
        .msg {
            padding: 12px 18px;
            border-radius: 15px;
            max-width: 70%;
            line-height: 1.4;
            font-size: 0.95rem;
            position: relative;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .cliente {
            align-self: flex-end;
            background: linear-gradient(135deg, #00D4FF, #3169B2);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .entrenador {
            align-self: flex-start;
            background: #2c3e50;
            color: #ecf0f1;
            border: 1px solid #34495e;
            border-bottom-left-radius: 2px;
        }

        /* Área de Entrada */
        .input-bar {
            padding: 20px;
            background: rgba(26, 38, 64, 0.8);
            display: flex;
            gap: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-bar input {
            flex: 1;
            padding: 12px 20px;
            border-radius: 25px;
            border: 1px solid #34495e;
            background: #0f172a;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        .input-bar input:focus { border-color: #00D4FF; }

        .btn-send {
            background: linear-gradient(135deg, #00D4FF, #3169B2);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.2);
        }

        .btn-send:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.4);
        }
    </style>
</head>
<body>

    <div class="messenger-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <a th:href="@{/dashboard}" class="btn-back">
                    <i class="fas fa-arrow-left"></i> Volver al Dashboard
                </a>
                <h3><i class="fas fa-dumbbell"></i> FitExpert</h3>
            </div>
            <div class="contacts-list">
                <div class="contact-card">
                    <div class="contact-avatar">
                        <i class="fas fa-user-tie"></i>
                    </div>
                    <div>
                        <strong th:text="${nombreEntrenador != null ? nombreEntrenador : 'Mi Entrenador'}" style="color: white;">Entrenador</strong>
                        <p style="margin:0; font-size: 0.8rem; color: #00D4FF;">Asignado</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-header">
                <i class="fas fa-comments" style="color: #00D4FF; font-size: 1.5rem;"></i>
                <h4>Chat de Asesoría Técnica</h4>
            </div>

            <div id="chat-box"></div>

            <div class="input-bar">
                <input type="text" id="messageInput" 
                       placeholder="Escribe tu duda al entrenador..." 
                       onkeypress="if(event.key === 'Enter') sendMessage()">
                <button class="btn-send" onclick="sendMessage()">
                    <i class="fas fa-paper-plane"></i> Enviar
                </button>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        const chatId = /*[[${chatId}]]*/ 1;
        const myId = /*[[${usuarioId}]]*/ 1; 

        async function loadMessages() {
            try {
                const res = await fetch(`/api/chat/mensajes/${chatId}`);
                const data = await res.json();
                
                const chatBox = document.getElementById("chat-box");
                chatBox.innerHTML = data.map(m => `
                    <div class="msg ${m.sender_id == myId ? 'cliente' : 'entrenador'}">
                        ${m.content}
                    </div>
                `).join("");
                
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (error) {
                console.error("Error al cargar mensajes:", error);
            }
        }

        async function sendMessage() {
            const input = document.getElementById("messageInput");
            const content = input.value.trim();
            if (!content) return;

            input.value = ""; 

            try {
                await fetch("/api/chat/enviar", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        chat_id: chatId,
                        sender_id: myId,
                        content: content
                    })
                });
                loadMessages();
            } catch (error) {
                console.error("Error al enviar:", error);
                alert("No se pudo enviar el mensaje.");
            }
        }

        loadMessages();
        setInterval(loadMessages, 4000);
    </script>
</body>
</html>
