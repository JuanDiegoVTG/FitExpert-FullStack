<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Configurar IA - FIT EXPERT</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/estilo.css}">
    <style>
        

        body {
            font-family: 'Segoe UI', sans-serif;
            background:url("/images/klipartz2.png"),  #8CA0DC;
            background-size: cover;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .form-container {
            background: linear-gradient(
                135deg, 
                rgb(33, 52, 106), 
                rgb(60, 94, 198)
            );
            padding: 40px;
            border-radius: 15px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text);
        }

        input, select {
            width: 100%;
            padding: 12px;
            background: #7575913d;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            box-sizing: border-box; /* Importante para que no se salga del contenedor */
        }

        select option {
            background: var(--secondary-light); /* fondo de cada opción */
            color: var(--text-main);            /* texto claro */
        }

        .btn-generar {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-generar:hover {
            background: var(--primary);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="form-container">
        <img th:src="@{/images/logofitexpert.jpeg}" alt="Emi-Lite" style="height:110px; width:120px; display:inline-block; vertical-align:middle;" />
            
        <h2> Configura tu IA</h2>
        <p>Ingresa tus datos actuales para una rutina perfecta.</p>
        
        <form th:action="@{/api/rutina-real}" method="get">
            
            <div class="input-group">
                <label>Tu peso actual (kg)</label>
                <input type="number" name="peso" step="0.1" min="30" max="300" placeholder="Ej: 75.5" required>
            </div>

            <div class="input-group">
                <label>Tu altura (m)</label>
                <input type="number" name="altura" step="0.01" min="1.00" max="2.50" placeholder="Ej: 1.75" required>
            </div>
            
            <div class="input-group">
                <label>Tu objetivo</label>
                <select name="objetivo">
                    <option value="ganar musculo">Ganar Músculo</option>
                    <option value="perder grasa">Perder Grasa</option>
                    <option value="definicion">Definición</option>
                </select>
            </div>

            <button type="submit" class="btn-generar">
                <i class="fas fa-magic"></i> Calcular y Generar
            </button>
        </form>
    </div>

</body>
</html>
