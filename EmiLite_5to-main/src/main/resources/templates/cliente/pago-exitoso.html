<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>¡Pago Exitoso! - Fit Expert</title>
    <link rel="stylesheet" th:href="@{/css/estilo.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon-green: #00ff88;
            --neon-blue: #00d2ff;
            --deep-space: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body {
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        /* Animación de entrada */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px); /* Efecto cristal */
            border-radius: 24px;
            padding: 3.5rem;
            text-align: center;
            max-width: 550px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 
                        0 0 20px rgba(0, 210, 255, 0.2);
            animation: slideUp 0.6s ease-out;
            position: relative;
        }

        /* El chulo neón con pulso */
        .check-container {
            position: relative;
            display: inline-block;
            margin-bottom: 1.5rem;
        }

        .check-icon {
            font-size: 6rem;
            color: var(--neon-green);
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            --webkit-background-clip: text;
            -webkit-text-fill-color:rgb (0, 210, 255, 0.5);
        }

        .text-muted {
            color: #94a3b8 !important;
            font-size: 1.1rem;
        }

        .details {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 15px;
            padding: 1.5rem;
            margin: 2rem 0;
            border-left: 4px solid var(--neon-blue);
        }

        .details p {
            margin: 0.8rem 0;
            font-size: 1rem;
        }

        .details strong {
            color: var(--neon-blue);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        /* El botón con estilo Fit Expert */
        .btn-activar {
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
            width: 100%;
        }

        .btn-activar:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0, 210, 255, 0.5);
            filter: brightness(1.1);
        }

        .btn-activar:active {
            transform: translateY(0);
        }

        .badge-pago {
            background: rgba(0, 255, 136, 0.1);
            color: var(--neon-green);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--neon-green);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="check-container">
            <i class="fas fa-check-circle check-icon"></i>
        </div>
        
        <h1>¡PAGO EXITOSO!</h1>
        <p class="text-muted">Tu nueva vida fitness comienza aquí.</p>
        
        <div class="details text-start">
            <p><strong>Entrenador Asignado:</strong> 
                <span th:text="${entrenador.nombres + ' ' + entrenador.apellidos}"></span>
            </p>
            <p><strong>Referencia:</strong> 
                <span th:text="${paymentId}" style="font-family: monospace;"></span>
            </p>
            <p><strong>Estado:</strong> 
                <span class="badge-pago">Suscripción Activa</span>
            </p>
        </div>

        <form th:action="@{/catalogo/activar-entrenador}" method="post">
            <input type="hidden" name="entrenadorId" th:value="${entrenadorId}">
            
            <button type="submit" class="btn-activar">
                Conectar con mi Coach <i class="fas fa-rocket ms-2"></i>
            </button>
        </form>
        
        <p style="margin-top: 1.5rem; font-size: 0.8rem; color: #64748b;">
            Haz clic para activar tu chat y recibir tu rutina personalizada.
        </p>
    </div>

</body>
</html>
