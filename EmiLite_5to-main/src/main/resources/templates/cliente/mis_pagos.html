<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Mis Pagos - FIT EXPERT</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/estilo.css}">
    <style>
        /* Variables de tema oscuro y colores de Emi-Lite */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .logo {
            margin-bottom: 30px;
        }

        .logo i {
            font-size: 3.5rem;
            color: white;
        }

        .logo-text {
            font-size: 2.2rem;
            font-weight: 800;
            color: white;
            letter-spacing: 1px;
            margin-top: 10px;
            display: block;
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 30px;
            color: var(--text);
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        th, td {
            padding: 15px 10px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            background-color: var(--primary-dark); /* Fondo morado oscuro para encabezados */
            color: var(--text);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.9rem;
        }

        tbody tr {
            transition: var(--transition);
        }

        tbody tr:hover {
            background-color: rgba(255, 255, 255, 0.05); /* Fondo ligeramente más claro al pasar el mouse */
        }

        .no-data {
            color: var(--text-light);
            font-style: italic;
            padding: 20px;
        }

    </style>
</head>
<body class="mis-pagos">
    <div class="container">
        <div class="logo">
             <!-- Icono representativo para pagos -->
            <img th:src="@{/images/logofitexpert.jpeg}" alt="Emi-Lite" style="height:110px; width:120px; display:inline-block; vertical-align:middle;" />
        </div>

        <h2>Mis Pagos</h2>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Servicio</th>
                    <th>Monto (COP)</th>
                    <th>Método de Pago</th>
                    <th>Estado</th>
                    <th>Fecha de Pago</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="pago : ${pagos}">
                    <td th:text="${pago.id}"></td>
                    <td th:text="${pago.servicio != null ? pago.servicio.nombre : 'N/A'}"></td>
                    <td th:text="|${#numbers.formatDecimal(pago.monto, 1, 2)} COP|"></td> <!-- Formateado como COP -->
                    <td th:text="${pago.metodoPago}"></td>
                    <td th:text="${pago.estado}"></td>
                    <td th:text="${#temporals.format(pago.fechaPago, 'dd/MM/yyyy HH:mm')}"></td>
                </tr>
            </tbody>
        </table>

        <!-- Mensaje si no hay pagos -->
        <div th:if="${#lists.isEmpty(pagos)}" class="no-data">
            <p>No tienes pagos registrados.</p>
        </div>

        <span sec:authorize="hasRole('ADMIN')">
            <a href="/admin/dashboard" class="back-link">Volver al Panel</a>
        </span>
        <span sec:authorize="hasRole('ENTRENADOR')">
            <a href="/entrenador/dashboard" class="back-link">Volver al Panel</a>
        </span>
        <span sec:authorize="hasRole('CLIENTE')">
            <a href="/cliente/dashboard" class="back-link">Volver al Panel</a>
        </span>
        <span sec:authorize="isAnonymous() or !hasAnyRole('ADMIN','ENTRENADOR','CLIENTE')">
            <a href="/dashboard" class="back-link">Volver al Panel</a>
        </span>

        <!-- Formulario para cerrar sesión -->
        <form th:action="@{/logout}" method="post" style="display: inline;">
            <input type="hidden" name="${_csrf.parameterName}" value="${_csrf.token}"/>
            <button type="submit" class="logout-link">Cerrar sesión</button>
        </form>
    </div>
</body>
</html>
