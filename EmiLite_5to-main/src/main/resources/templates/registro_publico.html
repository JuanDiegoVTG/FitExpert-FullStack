<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registro Pro - FIT EXPERT</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00d2ff; /* Cian vibrante */
            --primary-glow: rgba(0, 210, 255, 0.5);
            --neon-green: #00ff88;
            --error-neon: #ff0055;
            --secondary: #0f172a;
            --secondary-light: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --card-bg: rgba(15, 23, 42, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            padding: 40px;
            border-radius: 28px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 20px var(--primary-glow);
            border: 1px solid var(--border);
            text-align: center;
        }

        /* Stepper */
        .stepper { display: flex; justify-content: space-between; margin-bottom: 35px; position: relative; }
        .stepper::before { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: var(--border); z-index: 1; }
        
        .step-circle {
            width: 40px; height: 40px;
            background: var(--secondary-light);
            border: 2px solid var(--border);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; z-index: 2; transition: var(--transition);
        }
        .step-circle.active { 
            background: var(--primary); 
            border-color: var(--primary); 
            color: var(--secondary);
            box-shadow: 0 0 15px var(--primary);
        }

        .form-step { display: none; animation: fadeIn 0.4s ease; }
        .form-step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .form-group { margin-bottom: 22px; text-align: left; }
        label { display: block; font-size: 0.7rem; color: var(--primary); margin-bottom: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; }

        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); transition: var(--transition); }

        input, select {
            width: 100%; padding: 14px 14px 14px 45px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border); border-radius: 14px;
            color: white; font-size: 1rem; transition: var(--transition);
        }

        /* ARREGLO DE COLORES EN SELECT */
        select option {
            background-color: var(--secondary-light);
            color: white;
        }

        input:focus, select:focus { 
            border-color: var(--primary); 
            outline: none; 
            background: rgba(255,255,255,0.07);
            box-shadow: 0 0 10px var(--primary-glow);
        }
        input:focus + i, select:focus + i { color: var(--primary); }

        /* Manejo de Errores */
        .error-msg {
            color: var(--error-neon);
            font-size: 0.75rem;
            margin-top: 5px;
            font-weight: 600;
            display: block;
        }

        .alert-error {
            background: rgba(255, 0, 85, 0.1);
            border: 1px solid var(--error-neon);
            color: var(--error-neon);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        /* Botones */
        .btn-nav { padding: 16px 25px; border-radius: 14px; font-weight: 800; cursor: pointer; border: none; transition: var(--transition); text-transform: uppercase; letter-spacing: 1px; }
        .btn-next { background: var(--primary); color: var(--secondary); width: 100%; box-shadow: 0 4px 15px var(--primary-glow); }
        .btn-prev { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
        .btn-submit { background: var(--neon-green); color: var(--secondary); width: 100%; box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3); }

        .hidden { display: none; }
        .login-link { margin-top: 25px; display: block; color: var(--text-muted); text-decoration: none; font-size: 0.85rem; }
        .login-link b { color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <header style="margin-bottom: 30px;">
        <h2 style="font-weight: 900; letter-spacing: -2px; font-size: 2.2rem; background: linear-gradient(to right, #0f172a, var(--primary)); --webkit-background-clip: text; -webkit-text-fill-color: #000000;">FIT EXPERT</h2>
        <p style="color: var(--text-muted); font-size: 0.9rem;">Crea tu perfil de alto rendimiento</p>
    </header>

    <form th:action="@{/usuarios/crear-publico}" method="post" th:object="${usuarioForm}" enctype="multipart/form-data">

        <div th:if="${#fields.hasErrors('global')}" class="alert-error">
            <i class="fas fa-exclamation-triangle"></i> <span th:errors="*{global}"></span>
        </div>

        <div class="stepper">
            <div class="step-circle active" id="s1">1</div>
            <div class="step-circle" id="s2">2</div>
            <div class="step-circle" id="s3">3</div>
        </div>
        
        <div class="form-step active" id="step1">
            <div class="form-group">
                <label>Usuario</label>
                <div class="input-wrapper">
                    <i class="fas fa-at"></i>
                    <input type="text" th:field="*{userName}" placeholder="Nombre de usuario" required>
                </div>
                <span class="error-msg" th:if="${#fields.hasErrors('userName')}" th:errors="*{userName}"></span>
            </div>
            
            <div class="form-group">
                <label>Email Profesional</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" th:field="*{email}" placeholder="correo@ejemplo.com" required>
                </div>
                <span class="error-msg" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
            </div>

            <div class="form-group">
                <label>Contraseña Segura</label>
                <div class="input-wrapper">
                    <i class="fas fa-key"></i>
                    <input type="password" th:field="*{password}" placeholder="••••••••" required>
                </div>
            </div>

            <button type="button" class="btn-nav btn-next" onclick="move(1, 2)">Datos Personales <i class="fas fa-chevron-right"></i></button>
        </div>

        <div class="form-step" id="step2">
            <div class="form-group">
                <label>Nombre y Apellidos</label>
                <div class="input-wrapper" style="display: flex; gap: 10px;">
                    <input type="text" th:field="*{nombres}" placeholder="Nombres" required style="padding-left: 15px;">
                    <input type="text" th:field="*{apellidos}" placeholder="Apellidos" required style="padding-left: 15px;">
                </div>
            </div>

            <div class="row" style="display: flex; gap: 15px; margin-bottom: 22px;">
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <label>Fecha Nacimiento</label>
                    <div class="input-wrapper">
                        <i class="fas fa-calendar"></i>
                        <input type="date" th:field="*{fechaNacimiento}" required>
                    </div>
                </div>

                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <label>Sexo Biológico</label>
                    <div class="input-wrapper">
                        <i class="fas fa-venus-mars"></i>
                        <select th:field="*{sexo}" required>
                            <option value="" disabled selected>Elegir...</option>
                            <option value="M">Masc.</option>
                            <option value="F">Fem.</option>
                        </select>
                    </div>
                </div>
            </div>

            <div style="display: flex; gap: 10px;">
                <button type="button" class="btn-nav btn-prev" onclick="move(2, 1)">Atrás</button>
                <button type="button" class="btn-nav btn-next" onclick="move(2, 3)">Siguiente <i class="fas fa-chevron-right"></i></button>
            </div>
        </div>

        <div class="form-step" id="step3">
            <div class="form-group">
                <label>¿Cuál es tu perfil?</label>
                <div class="input-wrapper">
                    <i class="fas fa-user-tag"></i>
                    <select name="rolId" id="rolSelect" required onchange="checkTrainer()">
                        <option value="" disabled selected>Selecciona tu rol</option>
                        <option value="3">Atleta (Quiero entrenar)</option>
                        <option value="2">Entrenador (Busco clientes)</option>
                    </select>
                </div>
            </div>

            <div id="trainerUpload" class="form-group hidden" style="border: 2px dashed var(--primary); padding: 20px; border-radius: 18px; background: rgba(0, 210, 255, 0.05);">
                <label style="color: var(--neon-green);"><i class="fas fa-file-pdf"></i> Certificación / CV</label>
                <p style="font-size: 0.7rem; color: var(--text-muted); margin-bottom: 10px;">Para ser entrenador, adjunta tu título profesional.</p>
                <input type="file" name="archivoCv" id="archivoCv" accept=".pdf" style="padding: 10px; font-size: 0.8rem;">
            </div>

            <div style="display: flex; gap: 10px;">
                <button type="button" class="btn-nav btn-prev" onclick="move(3, 2)">Atrás</button>
                <button type="submit" class="btn-nav btn-submit">Lanzar Perfil <i class="fas fa-rocket"></i></button>
            </div>
        </div>
    </form>

    <a th:href="@{/login}" class="login-link">¿Ya eres parte de la élite? <b>Inicia sesión</b></a>
</div>

<script>
    function move(from, to) {
        document.getElementById('step' + from).classList.remove('active');
        document.getElementById('step' + to).classList.add('active');
        
        // Actualizar círculos
        if (to > from) {
            document.getElementById('s' + to).classList.add('active');
        } else {
            document.getElementById('s' + from).classList.remove('active');
        }
    }

    function checkTrainer() {
        const select = document.getElementById('rolSelect');
        const box = document.getElementById('trainerUpload');
        const cvInput = document.getElementById('archivoCv');

        if(select.value === "2") { 
            box.classList.remove('hidden');
            cvInput.required = true;
        } else {
            box.classList.add('hidden');
            cvInput.required = false;
            cvInput.value = "";
        }
    }
</script>
</body>
</html>
