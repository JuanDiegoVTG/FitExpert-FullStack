<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registro - FIT EXPERT</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Tus estilos aquí, puedes reutilizar parte del login.html */
        :root {
            /* Nueva paleta azul */
            --primary: #3169B2;       /* Azul principal */
            --primary-dark: #093E82;  /* Azul oscuro */
            --secondary: #0B1F3A;     /* Fondo principal oscuro */
            --secondary-light: #122B52; /* Fondo secciones */
            
            --accent: #0D52AB;        /* Azul intenso */
            --accent-dark: #093E82;

            --text: #EAF2FB;          /* Texto principal claro */
            --text-light: #AFC6E9;    /* Texto secundario */

            --card-bg: #122B52;       /* Fondo de tarjetas */
            --border: #1E3A6D;        /* Bordes */

            --success: #28A745;

            --shadow: 0 8px 25px rgba(9, 62, 130, 0.35);
            --transition: all 0.3s ease;

            /* Gradientes adaptados */
            --gradient-primary: linear-gradient(135deg, #5382BE 0%, #0D52AB 100%);
            --gradient-dark: linear-gradient(135deg, #0B1F3A 0%, #122B52 100%);
        }


        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--text-light) url("/images/klipartz3.png") no-repeat center center fixed;
            background-size: 80%;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background:
            linear-gradient(
                        135deg,rgb(33, 52, 106),rgb(60, 94, 198)
            ); /* Fondo de la tarjeta */
            padding: 25px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 600px; /* antes 450px */
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            margin-bottom: 30px;
        }

        .logo i {
            font-size: 3.5rem;
            color: white; /* Icono blanco */
        }

        .logo-text {
            font-size: 2.2rem;
            font-weight: 800;
            color: white; /* Texto blanco */
            letter-spacing: 1px;
            margin-top: 10px;
            display: block;
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 30px;
            color: var(--text); /* Color del texto */
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 12px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-light); /* Color del label */
            font-size: 1rem;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"],
        input[type="date"],
        select {
            width: 100%;
            padding: 12px;
            background-color: #6fa3fd98;
            color: #EAF2FB;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
        }

        option {
            background-color: #122B52;
            color: #EAF2FB;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary); /* Borde morado al enfocar */
            box-shadow: 0 0 0 3px rgba(62, 0, 123, 0.2); /* Sombra morada */
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--primary); /* Botón con gradiente morado */
            color: white;
            border: var(--primary-dark);
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(62, 0, 123, 0.4); /* Sombra más intensa */
        }

        .btn-submit:active {
            transform: translateY(-1px);
        }

        .error {
            color: var(--error); /* Color rojo para errores */
            font-size: 0.9rem;
            margin-top: 5px;
            text-align: left;
        }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: var(--text-light); /* Color morado para el enlace */
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
            font-size: 0.95rem;
        }

        .back-link:hover {
            text-decoration: underline;
            color: var(--secondary-light); /* Morado más claro al hover */
        }

        .form-header {
            margin-bottom: 35px;
        }

        .form-header p {
            color: var(--text-light); /* Texto secundario */
            font-size: 1rem;
            margin-top: 8px;
        }

        form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .full-width {
            grid-column: span 2;
        }

        @media (max-width: 768px) {
            form {
                grid-template-columns: 1fr;
            }

            .full-width {
                grid-column: span 1;
            }
        }


    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img th:src="@{/images/logofitexpert.jpeg}" alt="Emi-Lite" style="height:110px; width:120px; display:inline-block; vertical-align:middle;" />

        </div>

        <div class="form-header">
            <h2>Crear Nueva Cuenta</h2>
            <p>Completa tus datos para empezar el cambio</p>
        </div>

        <!-- Mostrar mensaje de error general -->
        <div th:if="${error}" class="message error-message">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
        </div>

        <form th:action="@{/usuarios/crear-publico}" method="post" th:object="${usuarioForm}">
    
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="form-group">
                <label>Nombre de Usuario *</label>
                <input type="text" th:field="*{userName}" required>
            </div>

            <div class="form-group">
                <label>Contraseña *</label>
                <input type="password" th:field="*{password}" required>
            </div>

            <div class="form-group full-width">
                <label>Email</label>
                <input type="email" th:field="*{email}">
            </div>

            <div class="form-group">
                <label>Nombres *</label>
                <input type="text" th:field="*{nombres}" required>
            </div>

            <div class="form-group">
                <label>Apellidos *</label>
                <input type="text" th:field="*{apellidos}" required>
            </div>

            <div class="form-group">
                <label>Teléfono</label>
                <input type="text" th:field="*{telefono}">
            </div>

            <div class="form-group">
                <label>Dirección</label>
                <input type="text" th:field="*{direccion}">
            </div>

            <div class="form-group">
                <label>Fecha de Nacimiento</label>
                <input type="date" th:field="*{fechaNacimiento}">
            </div>

            <div class="form-group full-width">
                <label>¿Cuál es tu objetivo?</label>
                <select name="rolId" required>
                    <option value="" disabled selected>Selecciona</option>
                    <option value="2">Atleta</option>
                    <option value="3">Entrenador</option>
                </select>
            </div>

            <button type="submit" class="btn-submit full-width">
                Registrarse
            </button>
        </form>

        <a href="/" class="back-link">Volver a la Página Principal</a>
    </div>
</body>
</html>
