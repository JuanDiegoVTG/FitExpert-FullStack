<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Finanzas - FIT EXPERT</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" th:href="@{/estilo_admin.css}">
    
    <style>
        /* Variables de respaldo en caso de que el CSS global falle */
        :root {
            --primary: #3169B2;
            --primary-dark: #093E82;
            --card-bg: rgba(18, 43, 82, 0.8);
            --border: rgba(30, 58, 109, 0.5);
            --text-muted: #AFC6E9;
            --accent: #10b981; /* Verde para completados */
            --warning: #f59e0b; /* Naranja para pendientes */
            --danger: #ef4444;  /* Rojo para fallidos */
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(at 0% 0%, #0b1f3a 0px, transparent 50%), 
                        radial-gradient(at 100% 100%, #122b52 0px, transparent 50%);
            background-color: #0b1f3a;
            color: #EAF2FB;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 1200px;
            border: 1px solid var(--border);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Header --- */
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
            padding-bottom: 25px;
            border-bottom: 1px solid var(--border);
        }

        .title-group { display: flex; align-items: center; gap: 15px; }
        .title-group i { 
            font-size: 2rem; 
            background: var(--primary);
            padding: 15px;
            border-radius: 12px;
            color: white;
        }

        .btn-create {
            background: var(--primary);
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 700;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }
        .btn-create:hover { background: var(--primary-dark); transform: translateY(-2px); }

        /* --- Tabla --- */
        .table-wrapper {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        table { width: 100%; border-collapse: collapse; }
        th {
            background: rgba(49, 105, 178, 0.1);
            padding: 15px 20px;
            text-align: left;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-light);
        }

        td { padding: 18px 20px; border-bottom: 1px solid var(--border); }
        tr:hover { background: rgba(255, 255, 255, 0.03); }

        /* --- Badges --- */
        .badge {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .badge-completado { background: rgba(16, 185, 129, 0.15); color: #34d399; }
        .badge-pendiente { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }
        .badge-fallido { background: rgba(239, 68, 68, 0.15); color: #f87171; }

        /* --- Botones --- */
        .btn-icon {
            width: 35px; height: 35px;
            display: inline-flex; align-items: center; justify-content: center;
            border-radius: 8px; border: 1px solid var(--border);
            color: white; transition: 0.3s; margin-left: 5px;
            background: rgba(255,255,255,0.05);
        }
        .btn-edit:hover { background: #0ea5e9; }
        .btn-delete:hover { background: var(--danger); }

        .footer-nav { margin-top: 30px; display: flex; justify-content: space-between; }
        .btn-back { color: var(--text-light); text-decoration: none; display: flex; align-items: center; gap: 5px; }
        
        button.btn-logout { 
            background: transparent; border: 1px solid var(--danger); 
            color: var(--danger); padding: 8px 16px; border-radius: 8px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="header-section">
            <div class="title-group">
                <i class="fas fa-wallet"></i>
                <div>
                    <h2>Control de Pagos</h2>
                    <p th:text="'Total registros: ' + ${#lists.size(pagos)}" style="color: var(--text-muted); font-size: 0.8rem;"></p>
                </div>
            </div>
            
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/pagos/nuevo}" class="btn-create">
                <i class="fas fa-plus"></i> Nuevo Registro
            </a>
        </header>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Cliente</th>
                        <th>Servicio</th>
                        <th>Monto</th>
                        <th>Método</th>
                        <th>Estado</th>
                        <th style="text-align: right;">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="pago : ${pagos}">
                        <td th:text="'#' + ${pago.id}" style="font-family: monospace; opacity: 0.7;"></td>
                        <td th:text="${pago.usuario.userName}" style="font-weight: 600;"></td>
                        <td th:text="${pago.servicio != null ? pago.servicio.nombre : 'Aporte FitExpert'}"></td>
                        <td style="font-weight: 700;">
                            <span style="color: #60a5fa;">$</span>
                            <span th:text="${#numbers.formatDecimal(pago.monto, 1, 'POINT', 0, 'COMMA')}"></span>
                        </td>
                        <td>
                            <i th:if="${pago.metodoPago == 'MERCADO_PAGO'}" class="fas fa-hand-holding-usd" style="color: #009ee3;" title="Mercado Pago"></i>
                            <i th:if="${pago.metodoPago == 'WOMPI'}" class="fas fa-credit-card" style="color: #6366f1;" title="Wompi"></i>
                            <i th:if="${pago.metodoPago == 'EFECTIVO'}" class="fas fa-money-bill-wave" style="color: #10b981;" title="Efectivo"></i>
                            <span th:text="${pago.metodoPago}" style="font-size: 0.75rem; margin-left: 5px;"></span>
                        </td>
                        <td>
                            <span th:class="${pago.estado == 'COMPLETADO' ? 'badge badge-completado' : (pago.estado == 'PENDIENTE' ? 'badge badge-pendiente' : 'badge badge-fallido')}" 
                                  th:text="${pago.estado}"></span>
                        </td>
                        <td style="text-align: right;">
                            <div class="action-btns" sec:authorize="hasRole('ADMIN')">
                                <a th:href="@{/admin/pagos/{id}/editar(id=${pago.id})}" class="btn-icon btn-edit" title="Editar">
                                    <i class="fas fa-edit"></i>
                                </a>
                                
                                <form th:action="@{/admin/pagos/{id}/eliminar(id=${pago.id})}" method="post" style="display: inline;" 
                                      onsubmit="return confirm('¿Eliminar este pago permanentemente?');">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn-icon btn-delete" title="Eliminar">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div th:if="${#lists.isEmpty(pagos)}" style="text-align: center; padding: 40px;">
                <p style="color: var(--text-muted);">No se encontraron registros de pagos.</p>
            </div>
        </div>

        <footer class="footer-nav">
            <a th:href="@{/dashboard}" class="btn-back">
                <i class="fas fa-arrow-left"></i> Volver al Panel
            </a>

            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-logout">
                    <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                </button>
            </form>
        </footer>
    </div>
</body>
</html>
