<body>

    <div class="container">
        <header class="header-section">
            <div class="title-group">
                <i class="fas fa-file-invoice-dollar"></i>
                <div>
                    <h2>Finanzas FitExpert</h2>
                    <p style="color: var(--text-muted); font-size: 0.85rem;">Gestión centralizada de pagos e ingresos</p>
                </div>
            </div>
            
            <span sec:authorize="hasRole('ADMIN')">
                <a href="/admin/pagos/nuevo" class="btn-create">
                    <i class="fas fa-plus-circle"></i> Nuevo Registro
                </a>
            </span>
        </header>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Cliente</th>
                        <th>Servicio</th>
                        <th>Monto</th>
                        <th>Método</th>
                        <th>Estado</th>
                        <th>Fecha</th>
                        <th style="text-align: right;">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="pago : ${pagos}">
                        <td th:text="'#' + ${pago.id}" style="color: var(--text-muted); font-family: monospace;"></td>
                        <td th:text="${pago.usuario.userName}" style="font-weight: 700;"></td>
                        <td th:text="${pago.servicio != null ? pago.servicio.nombre : 'Aporte Libre'}"></td>
                        <td style="font-weight: 800; color: white;">
                            <span style="color: var(--accent);">$</span>
                            <span th:text="${#numbers.formatDecimal(pago.monto, 1, 0)}"></span>
                        </td>
                        <td>
                            <i th:if="${pago.metodoPago == 'WOMPI'}" class="fas fa-credit-card" style="color: #6366f1;"></i>
                            <i th:if="${pago.metodoPago == 'EFECTIVO'}" class="fas fa-money-bill-alt" style="color: #10b981;"></i>
                            <i th:if="${pago.metodoPago == 'TRANSFERENCIA'}" class="fas fa-exchange-alt" style="color: #f59e0b;"></i>
                            <span th:text="${pago.metodoPago}" style="margin-left: 5px; font-size: 0.85rem;"></span>
                        </td>
                        <td>
                            <span th:class="${pago.estado == 'COMPLETADO' ? 'badge badge-completado' : (pago.estado == 'PENDIENTE' ? 'badge badge-pendiente' : 'badge badge-fallido')}" 
                                  th:text="${pago.estado}">
                            </span>
                        </td>
                        <td th:text="${#temporals.format(pago.fechaPago, 'dd MMM, yyyy')}" style="font-size: 0.85rem; color: var(--text-muted);"></td>
                        
                        <td style="text-align: right;">
                            <div class="action-btns" sec:authorize="hasRole('ADMIN')" style="justify-content: flex-end;">
                                <a th:href="@{/admin/pagos/{id}/editar(id=${pago.id})}" class="btn-icon btn-edit" title="Editar">
                                    <i class="fas fa-pen-nib"></i>
                                </a>
                                
                                <form th:action="@{/admin/pagos/{id}/eliminar(id=${pago.id})}" method="post" onsubmit="return confirm('¿Confirmas que deseas eliminar este registro permanentemente?');">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn-icon btn-delete" title="Eliminar">
                                        <i class="fas fa-trash-alt"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div th:if="${#lists.isEmpty(pagos)}" class="no-data">
                <i class="fas fa-folder-open" style="font-size: 3rem; margin-bottom: 15px; opacity: 0.3;"></i>
                <p>No hay registros de pagos para mostrar.</p>
            </div>
        </div>

        <footer class="footer-nav">
            <a href="/dashboard" class="btn-back">
                <i class="fas fa-chevron-left"></i> Volver al Panel Principal
            </a>

            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-logout">
                    <i class="fas fa-power-off"></i> Cerrar Sesión
                </button>
            </form>
        </footer>
    </div>

</body>
</html>
