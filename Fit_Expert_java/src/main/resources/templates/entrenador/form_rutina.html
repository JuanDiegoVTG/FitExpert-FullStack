<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title th:if="${rutinaId}">Editar Rutina - Fit Expert</title>
    <title th:unless="${rutinaId}">Crear Nueva Rutina - Fit Expert</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/estilo.css}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }

        body {
            background: url("/images/klipartz2.png"), #0b1f3a;
            background-size: cover;
            background-attachment: fixed;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }

        .container {
            background-color: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(15px);
            padding: 45px 50px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 800px; /* Más ancho para la doble columna */
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header-title {
            margin-bottom: 35px;
        }

        .header-title h2 {
            font-size: 2.2rem;
            color: #ffffff;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .header-title p {
            color: #afc6e9;
            font-size: 0.95rem;
        }

        /* --- SISTEMA DE GRID (Como en Valoración) --- */
        .section-tag {
            background: rgba(0, 212, 255, 0.1);
            color: #00D4FF;
            padding: 8px 16px;
            border-radius: 8px;
            display: inline-block;
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 25px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            text-align: left;
            width: 100%;
        }

        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 25px;
        }

        .col-md-6 {
            flex: 1;
            min-width: calc(50% - 10px);
        }

        .col-12 {
            flex: 1 1 100%;
        }

        /* --- INPUTS MODERNOS --- */
        .input-group-custom { text-align: left; }
        
        .label-custom {
            display: block;
            margin-bottom: 8px;
            color: #afc6e9;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .input-box {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-box i {
            position: absolute;
            left: 16px;
            color: #00D4FF;
            font-size: 1.1rem;
            pointer-events: none; /* Evita que el icono bloquee el clic */
        }

        .form-control-fit {
            width: 100%;
            padding: 14px 16px 14px 45px; /* Espacio para el icono a la izquierda */
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-control-fit:focus {
            border-color: #00D4FF;
            background-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }

        select.form-control-fit {
            cursor: pointer;
            appearance: none;
        }

        select.form-control-fit option {
            background-color: #1e2f62;
            color: white;
            padding: 12px;
        }

        textarea.form-control-fit {
            padding-left: 16px; /* Textarea sin icono adentro */
            min-height: 120px;
            resize: vertical;
        }

        /* --- TOGGLE SWITCH (Reemplaza el checkbox básico) --- */
        .switch-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 30px;
        }

        .switch-label {
            font-weight: 600;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #334155; transition: .4s; border-radius: 34px;
        }

        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px;
            left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%;
        }

        input:checked + .slider { background-color: #10b981; }
        input:focus + .slider { box-shadow: 0 0 1px #10b981; }
        input:checked + .slider:before { transform: translateX(24px); }

        /* --- BOTONES Y ALERTAS --- */
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00D4FF, #3169B2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.2);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.4);
        }

        .error-msg {
            color: #ff4d4d;
            font-size: 0.85rem;
            margin-top: 6px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 25px;
            padding: 12px 25px;
            background: rgba(255,255,255,0.05);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .back-link:hover {
            background: rgba(255,255,255,0.1);
            transform: translateX(-5px);
        }
        
        /* Flechita para los selects */
        .select-wrapper::after {
            content: '\f107';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            right: 15px;
            color: #afc6e9;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        
        <div class="header-title">
            <h2 th:text="${rutinaId} ? 'Editar Rutina' : 'Crear Nueva Rutina'"></h2>
            <p th:text="${rutinaId} ? 'Modifica los parámetros de entrenamiento del alumno.' : 'Diseña un nuevo plan de entrenamiento estructurado.'"></p>
        </div>

        <div th:if="${error}" style="background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; padding: 15px; border-radius: 12px; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; text-align: left;">
            <i class="fas fa-exclamation-triangle" style="color: #ef4444; font-size: 1.2rem;"></i> 
            <span th:text="${error}" style="color: #ef4444; font-weight: 600;"></span>
        </div>

        <form th:action="${rutinaId} ? @{/entrenador/rutinas/{id}(id=${rutinaId})} : @{/entrenador/rutinas}" th:object="${rutinaForm}" method="post">
            
            <div class="section-tag"><i class="fas fa-dumbbell"></i> Datos Generales</div>
            
            <div class="row">
                <div class="col-12 input-group-custom">
                    <label class="label-custom">Nombre de la Rutina</label>
                    <div class="input-box">
                        <i class="fas fa-heading"></i>
                        <input type="text" th:field="*{nombre}" class="form-control-fit" placeholder="Ej: Hipertrofia Nivel 1" required>
                    </div>
                    <div class="error-msg" th:if="${#fields.hasErrors('nombre')}">
                        <i class="fas fa-times-circle"></i> <span th:errors="*{nombre}"></span>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 input-group-custom">
                    <label class="label-custom">Tipo de Entrenamiento</label>
                    <div class="input-box select-wrapper">
                        <i class="fas fa-layer-group"></i>
                        <select th:field="*{tipo}" class="form-control-fit">
                            <option value="">Seleccione un tipo</option>
                            <option value="Cardio">Cardio</option>
                            <option value="Fuerza">Fuerza</option>
                            <option value="Flexibilidad">Flexibilidad</option>
                            <option value="IA Generada">IA Generada</option>
                        </select>
                    </div>
                </div>
                
                <div class="col-md-6 input-group-custom">
                    <label class="label-custom">Nivel de Dificultad</label>
                    <div class="input-box select-wrapper">
                        <i class="fas fa-tachometer-alt"></i>
                        <select th:field="*{nivelDificultad}" class="form-control-fit">
                            <option value="">Seleccione un nivel</option>
                            <option value="Principiante">Principiante</option>
                            <option value="Intermedio">Intermedio</option>
                            <option value="Avanzado">Avanzado</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="section-tag"><i class="fas fa-clipboard-list"></i> Asignación y Detalles</div>

            <div class="row">
                <div class="col-md-6 input-group-custom">
                    <label class="label-custom">Duración (Semanas)</label>
                    <div class="input-box">
                        <i class="fas fa-calendar-week"></i>
                        <input type="number" th:field="*{duracionSemanas}" class="form-control-fit" min="1" placeholder="Ej: 4">
                    </div>
                </div>
                
                <div class="col-md-6 input-group-custom">
                    <label class="label-custom">Asignar a Cliente</label>
                    <div class="input-box select-wrapper">
                        <i class="fas fa-user-tag"></i>
                        <select th:field="*{clienteId}" class="form-control-fit" required>
                            <option value="" disabled selected>Seleccione un cliente</option>
                            <option th:each="cliente : ${clientes}" 
                                    th:value="${cliente.id}" 
                                    th:text="${cliente.nombres + ' ' + cliente.apellidos}">
                            </option>
                        </select>
                    </div>
                    <div class="error-msg" th:if="${#fields.hasErrors('clienteId')}">
                        <i class="fas fa-times-circle"></i> <span th:errors="*{clienteId}"></span>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-12 input-group-custom">
                    <label class="label-custom">Descripción / Ejercicios</label>
                    <textarea th:field="*{descripcion}" class="form-control-fit" placeholder="Detalla los ejercicios, series y repeticiones. Puedes estructurarlo por días..."></textarea>
                </div>
            </div>

            <div class="switch-container">
                <div class="switch-label">
                    <i class="fas fa-power-off" style="color: #00D4FF;"></i> Estado de la Rutina
                </div>
                <label class="switch">
                    <input type="checkbox" th:field="*{activa}">
                    <span class="slider"></span>
                </label>
            </div>

            <button type="submit" class="btn-submit">
                <i class="fas fa-save me-2"></i> <span th:text="${rutinaId} ? 'Actualizar Rutina' : 'Guardar Rutina'"></span>
            </button>
        </form>

        <div style="margin-top: 15px;">
            <a th:href="@{/entrenador/rutinas}" class="back-link">
                <i class="fas fa-arrow-left"></i> Cancelar y Volver
            </a>
        </div>
    </div>
</body>
</html>
