<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title th:if="${usuarioId}">Editar Usuario - Fit Expert</title>
    <title th:unless="${usuarioId}">Crear Nuevo Usuario</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #050b1f;
            --bg-card: rgba(255,255,255,0.04);
            --primary: #00d2ff;
            --primary-2: #00e6a8;
            --text: #e6ecff;
            --text-light: #9fb3d9;
            --border: rgba(255,255,255,0.08);
            --error: #ff4d6d;
            --success: #2ecc71;
            --shadow: 0 20px 60px rgba(0,0,0,0.6);
            --radius: 20px;
            --transition: all 0.3s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif;}

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
            background-color: var(--bg-dark);
        }

        .container {
            width: 100%;
            max-width: 950px;
            background: radial-gradient(circle at 20% 20%, #0b1a3a, #020617);
            border-radius: var(--radius);
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            margin: 40px 0;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: var(--primary);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .form-panel {
            display: flex;
            padding: 40px;
            flex-direction: column;
            justify-content: center;
            border-radius: 25px;
            backdrop-filter: blur(16px);
            background: var(--bg-card);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .section {
            background: rgba(0, 0, 0, 0.2); 
            padding: 25px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        .section-titulo {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: var(--primary);
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 18px;
        }
    
        label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: var(--text-light);
            font-weight: 500;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.06);
            color: var(--text);
            transition: var(--transition);
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(0, 210, 255, 0.2);
            outline: none;
            background: rgba(255,255,255,0.09);
        }

        /* Ajuste para las opciones del select en modo oscuro */
        select option {
            background-color: var(--bg-dark);
            color: var(--text);
        }

        .error {
            color: var(--error);
            font-size: 0.8rem;
            margin-top: 6px;
            font-weight: 500;
        }

        .btn-submit {
            margin-top: 30px;
            font-weight: bold;
            font-size: 1.05rem;
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(90deg, var(--primary), var(--primary-2));
            color: #020617;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 210, 255, 0.4);
        }

        .footer-links {
            margin-top: 30px;
            text-align: center;
        }

        .footer-links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 10px;
            background: rgba(0, 210, 255, 0.1);
            transition: var(--transition);
            display: inline-block;
        }

        .footer-links a:hover {
            background: rgba(0, 210, 255, 0.2);
            color: #fff;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-panel {
                padding: 25px;
            }
        }
    </style>
</head>

<body>
<div class="container">

    <div class="logo-container">
        <img th:src="@{/images/logofitexpert.jpeg}" alt="Fit Expert" style="height:110px; width:auto; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.5);" />
    </div>

    <h2 th:if="${usuarioId}">Editar Usuario</h2>
    <h2 th:unless="${usuarioId}">Crear Usuario</h2>
    
    <div th:if="${error}" class="section" style="background: rgba(255, 77, 109, 0.1); border-color: var(--error); margin-bottom: 20px;">
        <p style="color: var(--error); text-align: center; margin: 0; font-weight: bold;" th:text="${error}"></p>
    </div>

    <section class="form-panel">
        
        <form th:action="${usuarioId} ? @{/admin/usuarios/{id}(id=${usuarioId})} : @{/admin/usuarios}" th:object="${usuarioForm}" method="post">

            <div class="form-grid">

                <div class="section">
                    <div class="section-titulo"><i class="fas fa-user-shield" style="margin-right: 10px;"></i> Datos de Cuenta</div>

                    <div class="form-group">
                        <label>Usuario</label>
                        <input type="text" th:field="*{userName}" placeholder="Nombre de usuario" required>
                        <div class="error" th:if="${#fields.hasErrors('userName')}" th:errors="*{userName}"></div>
                    </div>

                    <div class="form-group">
                        <label>Contraseña</label>
                        <input type="password" th:field="*{password}" placeholder="Vacío para no cambiar">
                        <div class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" th:field="*{email}" placeholder="correo@email.com" required>
                        <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>

                    <div class="form-group">
                        <label>Rol</label>
                        <select th:field="*{rolId}" id="rolSelect" required onchange="toggleDescripcion()">
                            <option value="">Seleccione un rol</option>
                            <option th:each="rol : ${roles}" th:value="${rol.id}" th:text="${rol.nombre}"></option>
                        </select>
                        <div class="error" th:if="${#fields.hasErrors('rolId')}" th:errors="*{rolId}"></div>
                    </div>

                    <div class="form-group" id="descripcion-wrapper" style="display: none;">
                        <label>Descripción Profesional</label>
                        <textarea th:field="*{descripcion}"
                                rows="4"
                                maxlength="500"
                                placeholder="Especialidades, experiencia, etc...">
                        </textarea>
                    </div>

                </div>

                <div class="section">
                    <div class="section-titulo"><i class="fas fa-id-card" style="margin-right: 10px;"></i> Información Personal</div>

                    <div class="form-group">
                        <label>Nombres</label>
                        <input type="text" th:field="*{nombres}" required>
                        <div class="error" th:if="${#fields.hasErrors('nombres')}" th:errors="*{nombres}"></div>
                    </div>

                    <div class="form-group">
                        <label>Apellidos</label>
                        <input type="text" th:field="*{apellidos}" required>
                        <div class="error" th:if="${#fields.hasErrors('apellidos')}" th:errors="*{apellidos}"></div>
                    </div>

                    <div class="form-group">
                        <label>Teléfono</label>
                        <input type="tel" th:field="*{telefono}">
                    </div>

                    <div class="form-group">
                        <label>Dirección</label>
                        <input type="text" th:field="*{direccion}">
                    </div>

                    <div class="form-group">
                        <label>Fecha de Nacimiento</label>
                        <input type="date" th:field="*{fechaNacimiento}">
                    </div>
                </div>

            </div>

            <button type="submit" class="btn-submit">
                <i class="fas fa-save" style="margin-right: 8px;"></i> 
                <span th:text="${usuarioId} ? 'Guardar Cambios' : 'Registrar Usuario'"></span>
            </button>
        </form>
    </section>

    <div class="footer-links">
        <a href="/admin/usuarios"><i class="fas fa-arrow-left" style="margin-right: 8px;"></i> Volver al Panel</a>
    </div>

</div>

<script>
    function toggleDescripcion() {
        const select = document.getElementById('rolSelect');
        const wrapper = document.getElementById('descripcion-wrapper');
        
        if (select.selectedIndex === -1) return;
        
        const selectedText = select.options[select.selectedIndex].text;
        
        if (selectedText.toUpperCase().includes('ENTRENADOR')) {
            wrapper.style.display = 'block';
        } else {
            wrapper.style.display = 'none';
        }
    }

    // Se ejecuta al cargar la página para revisar el estado inicial (útil al editar)
    window.addEventListener('DOMContentLoaded', toggleDescripcion);
</script>
</body>
</html>
