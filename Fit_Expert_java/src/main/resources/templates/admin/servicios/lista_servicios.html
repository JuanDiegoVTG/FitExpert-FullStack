<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Lista de Servicios - Fit Expert</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/estilo_admin.css}">
    <style>
        :root {
            --primary: #3169B2;
            --accent: #00D4FF;
            --bg-dark: #0b1f3a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --transition: all 0.3s ease;
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { padding: 20px; display: flex; justify-content: center; min-height: 100vh; background: #060e1a; color: var(--text-main); font-family: sans-serif;}
        
        .container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 28px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 1100px;
            border: 1px solid var(--border);
            animation: fadeIn 0.6s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Header UX --- */
        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; border-bottom: 1px solid var(--border); padding-bottom: 25px; }
        .title-group { display: flex; align-items: center; gap: 18px; }
        .title-group i { font-size: 2.2rem; background: var(--primary); padding: 12px; border-radius: 15px; color: white; }
        
        /* --- Tabla Responsiva --- */
        .table-wrapper { background: rgba(15, 23, 42, 0.4); border-radius: 20px; overflow-x: auto; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { padding: 18px 20px; text-align: left; font-size: 0.75rem; text-transform: uppercase; color: var(--primary); }
        td { padding: 20px; border-bottom: 1px solid var(--border); font-size: 0.95rem; }
        
        /* --- Badges de Activa --- */
        .status-badge { padding: 6px 12px; border-radius: 10px; font-size: 0.75rem; font-weight: 800; }
        .status-on { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); }
        .status-off { background: rgba(148, 163, 184, 0.1); color: var(--text-muted); border: 1px solid var(--border); }

        .header-actions { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

        /* --- Estilos de Botones Mejorados --- */
        .btn-create { 
            background: var(--primary); 
            color: white; 
            padding: 12px 24px; 
            border-radius: 10px; 
            text-decoration: none; 
            font-weight: 700; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            transition: var(--transition);
            border: 1px solid transparent;
        }
        .btn-create:hover { background: var(--accent); color: var(--bg-dark); transform: translateY(-2px); }

        .btn-filter {
            background: rgba(255,255,255,0.05);
            color: white;
            border: 1px solid var(--border);
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-filter:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }

        .btn-logout-pro {
            background: transparent;
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-logout-pro:hover { background: #ef4444; color: white; transform: translateY(-2px); }

        .action-btns { display: flex; gap: 10px; justify-content: flex-end; }
        .btn-icon { width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 10px; border: 1px solid var(--border); color: var(--text-muted); background: rgba(255, 255, 255, 0.03); cursor: pointer; text-decoration: none; transition: var(--transition); }
        .btn-icon:hover { background: rgba(255, 255, 255, 0.1); color: white; transform: scale(1.1); }
        .btn-icon-delete:hover { background: rgba(239, 68, 68, 0.2); color: #ef4444; border-color: rgba(239, 68, 68, 0.3); }
        
        @media (max-width: 768px) { .container { padding: 20px; } .header-section { flex-direction: column; gap: 20px; align-items: flex-start; } }
    </style>
</head>
<body>
    <div class="container">
        <header class="header-section">
            <div class="title-group">
                <i class="fas fa-concierge-bell"></i>
                <div>
                    <h2>Catálogo de Servicios</h2>
                    <p style="color: var(--text-muted); font-size: 0.85rem;">Gestiona las ofertas y planes</p>
                </div>
            </div>
            
            <div class="header-actions">
                
                <a th:href="@{/dashboard}" class="btn-filter">
                    <i class="fas fa-arrow-left"></i> Volver al Dashboard
                </a>

                <a href="/admin/servicios/nuevo" class="btn-create" sec:authorize="hasRole('ADMIN')">
                    <i class="fas fa-plus-circle"></i> Crear Nuevo
                </a>

                <form th:action="@{/logout}" method="post" style="margin: 0;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn-logout-pro" title="Cerrar Sesión">
                        <i class="fas fa-power-off"></i> Salir
                    </button>
                </form>
                
            </div>
        </header>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Servicio</th>
                        <th>Descripción</th>
                        <th>Duración</th>
                        <th>Precio (COP)</th>
                        <th>Estado</th>
                        <th style="text-align: right;">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="servicio : ${servicios}">
                        <td th:text="'#' + ${servicio.id}" style="color: var(--text-muted);"></td>
                        <td th:text="${servicio.nombre}" style="font-weight: 700;"></td>
                        <td th:text="${servicio.descripcion}" style="font-size: 0.85rem; color: var(--text-muted);"></td>
                        <td><span class="duration-badge" th:text="${servicio.duracionMinutos + ' min'}"></span></td>
                        <td th:text="'$' + ${#numbers.formatDecimal(servicio.precio, 1, 0)}"></td>
                        <td>
                            <span th:class="${servicio.activa ? 'status-badge status-on' : 'status-badge status-off'}"
                                  th:text="${servicio.activa ? 'ACTIVO' : 'INACTIVO'}">
                            </span>
                        </td>
                        <td style="text-align: right;">
                            <div class="action-btns" sec:authorize="hasRole('ADMIN')">
                                <a th:href="@{/admin/servicios/{id}/editar(id=${servicio.id})}" class="btn-icon" title="Editar"><i class="fas fa-edit"></i></a>
                                
                                <form th:action="@{/admin/servicios/{id}/eliminar(id=${servicio.id})}" method="post" style="display:inline;">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn-icon btn-icon-delete" title="Eliminar" onclick="return confirm('¿Confirmar eliminación?')"><i class="fas fa-trash-alt"></i></button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
