<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Lista de Servicios - Fit Expert</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg-dark); 
            color: var(--text); 
            margin: 0;
            padding: 20px;
        }

        .container { 
            max-width: 1000px; 
            margin: auto; 
            background: var(--card-bg); 
            backdrop-filter: blur(12px);
            padding: 30px; 
            border-radius: 24px; 
            border: 1px solid var(--border);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3);
        }

        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        /* Ajuste para celular */
        .table-wrapper { overflow-x: auto; border-radius: 16px; border: 1px solid var(--border); }
        
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: rgba(99, 102, 241, 0.1); padding: 16px; text-align: left; font-size: 0.8rem; text-transform: uppercase; color: var(--primary); }
        td { padding: 16px; border-bottom: 1px solid var(--border); }

        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
        .status-on { background: rgba(16, 185, 129, 0.15); color: #10b981; }
        .status-off { background: rgba(148, 163, 184, 0.1); color: var(--text-muted); }

        .btn-action { background: transparent; border: none; cursor: pointer; color: var(--text-muted); padding: 8px; transition: 0.3s; }
        .btn-action:hover { color: var(--text); transform: scale(1.1); }

        @media (max-width: 600px) {
            .container { padding: 15px; }
            h2 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="header-section">
            <div>
                <h2>Catálogo de Servicios</h2>
                <p style="color: var(--text-muted); font-size: 0.85rem;">Gestión de planes FitExpert</p>
            </div>
            <a href="/admin/servicios/nuevo" class="btn-primary" sec:authorize="hasRole('ADMIN')" 
               style="background: var(--primary); color: white; padding: 10px 20px; border-radius: 12px; text-decoration: none; font-weight: 600;">
                <i class="fas fa-plus"></i> Crear
            </a>
        </header>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Precio</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="servicio : ${servicios}">
                        <td th:text="${servicio.nombre}" style="font-weight: 600;"></td>
                        <td th:text="'$' + ${#numbers.formatDecimal(servicio.precio, 1, 0)}"></td>
                        <td>
                            <span th:class="${servicio.activa ? 'status-badge status-on' : 'status-badge status-off'}"
                                  th:text="${servicio.activa ? 'ACTIVO' : 'INACTIVO'}">
                            </span>
                        </td>
                        <td>
                            <div sec:authorize="hasRole('ADMIN')">
                                <a th:href="@{/admin/servicios/{id}/editar(id=${servicio.id})}" class="btn-action"><i class="fas fa-edit"></i></a>
                                <form th:action="@{/admin/servicios/{id}/eliminar(id=${servicio.id})}" method="post" style="display:inline;">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn-action" onclick="return confirm('¿Seguro?')"><i class="fas fa-trash"></i></button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
