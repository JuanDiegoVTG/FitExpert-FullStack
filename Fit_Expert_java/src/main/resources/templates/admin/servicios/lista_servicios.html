<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Lista de Servicios - Fit Expert</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --card-bg: #1a1a2e;
            --danger: #ef4444;
            --border: #333;
            --text-muted: #94a3b8;
            --accent: #10b981;
        }

        body { font-family: 'Segoe UI', sans-serif; background: #0f0f12; color: white; padding: 15px; }

        .container { max-width: 1000px; margin: auto; background: var(--card-bg); padding: 25px; border-radius: 20px; border: 1px solid var(--border); }

        /* Responsividad para celular */
        .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-top: 20px; }
        
        table { width: 100%; min-width: 600px; border-collapse: collapse; }
        
        th, td { padding: 15px; border-bottom: 1px solid var(--border); text-align: left; }
        
        .status-badge { padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; }
        .status-on { background: rgba(16, 185, 129, 0.2); color: var(--accent); }
        .status-off { background: rgba(148, 163, 184, 0.1); color: var(--text-muted); }
        
        @media (max-width: 600px) {
            .container { padding: 15px; }
            .header-section { flex-direction: column; gap: 15px; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="header-section">
            <h2>Catálogo de Servicios</h2>
            <a href="/admin/servicios/nuevo" class="btn-create" sec:authorize="hasRole('ADMIN')">
                <i class="fas fa-plus"></i> Nuevo
            </a>
        </header>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Servicio</th>
                        <th>Precio</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="servicio : ${servicios}">
                        <td th:text="${servicio.nombre}"></td>
                        <td th:text="'$' + ${#numbers.formatDecimal(servicio.precio, 1, 0)}"></td>
                        <td>
                            <span th:class="${servicio.activa ? 'status-badge status-on' : 'status-badge status-off'}"
                                  th:text="${servicio.activa ? 'ACTIVO' : 'INACTIVO'}">
                            </span>
                        </td>
                        <td>
                            <div class="action-btns" sec:authorize="hasRole('ADMIN')">
                                <a th:href="@{/admin/servicios/{id}/editar(id=${servicio.id})}" title="Editar"><i class="fas fa-edit"></i></a>
                                <form th:action="@{/admin/servicios/{id}/eliminar(id=${servicio.id})}" method="post" style="display:inline;">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" title="Eliminar"><i class="fas fa-trash"></i></button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
