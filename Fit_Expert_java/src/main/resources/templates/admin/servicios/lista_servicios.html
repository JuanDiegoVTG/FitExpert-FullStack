<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Lista de Servicios - Fit Expert</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/estilo_admin.css}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 28px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 1100px;
            border: 1px solid var(--border);
            animation: fadeIn 0.6s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Header UX --- */
        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; border-bottom: 1px solid var(--border); padding-bottom: 25px; }
        .title-group { display: flex; align-items: center; gap: 18px; }
        .title-group i { font-size: 2.2rem; background: var(--primary); padding: 12px; border-radius: 15px; color: white; }
        
        /* --- Tabla Responsiva --- */
        .table-wrapper { background: rgba(15, 23, 42, 0.4); border-radius: 20px; overflow-x: auto; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { padding: 18px 20px; text-align: left; font-size: 0.75rem; text-transform: uppercase; color: var(--primary); }
        td { padding: 20px; border-bottom: 1px solid var(--border); font-size: 0.95rem; }
        
        /* --- Badges de Activa --- */
        .status-badge { padding: 6px 12px; border-radius: 10px; font-size: 0.75rem; font-weight: 800; }
        .status-on { background: rgba(16, 185, 129, 0.1); color: var(--accent); border: 1px solid rgba(16, 185, 129, 0.2); }
        .status-off { background: rgba(148, 163, 184, 0.1); color: var(--text-muted); border: 1px solid var(--border); }

        .btn-create { background: var(--primary); color: white; padding: 14px 28px; border-radius: 14px; text-decoration: none; font-weight: 700; display: inline-flex; align-items: center; gap: 10px; }
        .action-btns { display: flex; gap: 10px; justify-content: flex-end; }
        .btn-icon { width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 10px; border: 1px solid var(--border); color: var(--text-muted); background: rgba(255, 255, 255, 0.03); cursor: pointer; text-decoration: none; }
        
        @media (max-width: 768px) { .container { padding: 20px; } .header-section { flex-direction: column; gap: 20px; } }

        .header-actions {
    display: flex;
    align-items: center;
    gap: 12px;
}

.btn-filter {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-filter:hover { background: var(--accent); color: var(--bg-dark); transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <header class="header-section">
            <div class="title-group">
                <i class="fas fa-concierge-bell"></i>
                <div>
                    <h2>Catálogo de Servicios</h2>
                    <p style="color: var(--text-muted); font-size: 0.85rem;">Gestiona las ofertas y planes</p>
                </div>
            </div>
            
            <div class="header-actions">
                
                <a th:href="@{/admin/dashboard}" class="btn-filter" style="background: rgba(255,255,255,0.05); border: 1px solid var(--border-light);">
                    <i class="fas fa-arrow-left"></i> Volver al Dashboard
                </a>

                <a href="/admin/servicios/nuevo" class="btn-create" sec:authorize="hasRole('ADMIN')">
                    <i class="fas fa-plus-circle"></i> Crear Nuevo
                </a>

                <form th:action="@{/logout}" method="post" style="margin: 0;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn-logout-pro" title="Cerrar Sesión">
                        <i class="fas fa-power-off"></i>
                    </button>
                </form>
                
            </div>
        </header>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Servicio</th>
                        <th>Descripción</th>
                        <th>Duración</th>
                        <th>Precio (COP)</th>
                        <th>Estado</th>
                        <th style="text-align: right;">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="servicio : ${servicios}">
                        <td th:text="'#' + ${servicio.id}" style="color: var(--text-muted);"></td>
                        <td th:text="${servicio.nombre}" style="font-weight: 700;"></td>
                        <td th:text="${servicio.descripcion}" style="font-size: 0.85rem; color: var(--text-muted);"></td>
                        <td><span class="duration-badge" th:text="${servicio.duracionMinutos + ' min'}"></span></td>
                        <td th:text="'$' + ${#numbers.formatDecimal(servicio.precio, 1, 0)}"></td>
                        <td>
                            <span th:class="${servicio.activa ? 'status-badge status-on' : 'status-badge status-off'}"
                                  th:text="${servicio.activa ? 'ACTIVO' : 'INACTIVO'}">
                            </span>
                        </td>
                        <td style="text-align: right;">
                            <div class="action-btns" sec:authorize="hasRole('ADMIN')">
                                <a th:href="@{/admin/servicios/{id}/editar(id=${servicio.id})}" class="btn-icon" title="Editar"><i class="fas fa-edit"></i></a>
                                <form th:action="@{/admin/servicios/{id}/eliminar(id=${servicio.id})}" method="post" style="display:inline;">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn-icon" title="Eliminar" onclick="return confirm('¿Confirmar eliminación?')"><i class="fas fa-trash-alt"></i></button>
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        </div>
</body>
</html>
