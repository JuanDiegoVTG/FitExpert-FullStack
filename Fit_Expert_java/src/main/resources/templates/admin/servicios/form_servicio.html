<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gestión de Servicios - Fit Expert</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6c5ce7;
            --bg: #0f0f12;
            --card-bg: #1a1a2e;
            --text: #ffffff;
            --text-light: #b3b3b3;
            --border: #333;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
        }

        h2 { text-align: center; margin-bottom: 25px; }

        .form-group { margin-bottom: 15px; }
        
        label { display: block; margin-bottom: 5px; color: var(--text-light); }

        input, textarea {
            width: 100%;
            padding: 12px;
            background: #252545;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn-submit:hover { background: #5a4ad1; }
        
        .back-link { 
            display: block; 
            text-align: center; 
            margin-top: 15px; 
            color: var(--primary); 
            text-decoration: none; 
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 th:text="${servicio.id} ? 'Editar Servicio' : 'Crear Nuevo Servicio'">Gestión</h2>

        <form th:action="@{/admin/servicios/guardar}" th:object="${servicio}" method="post">
            
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            
            <input type="hidden" th:field="*{id}" />

            <div class="form-group">
                <label>Nombre:</label>
                <input type="text" th:field="*{nombre}" required placeholder="Nombre del servicio">
            </div>

            <div class="form-group">
                <label>Descripción:</label>
                <textarea th:field="*{descripcion}" rows="3" placeholder="Detalles..."></textarea>
            </div>

            <div class="form-group">
                <label>Duración (minutos):</label>
                <input type="number" th:field="*{duracionMinutos}" required min="1">
            </div>

            <div class="form-group">
                <label>Precio (COP):</label>
                <input type="number" th:field="*{precio}" step="any" required min="0">
            </div>

            <button type="submit" class="btn-submit">Guardar Cambios</button>
        </form>

        <a href="/admin/servicios" class="back-link"><i class="fas fa-arrow-left"></i> Volver a la lista</a>
    </div>

</body>
</html>
