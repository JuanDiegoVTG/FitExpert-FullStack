<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login | FIT EXPERT</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #050b1f;
            --bg-card: rgba(255,255,255,0.04);

            --primary: #00d2ff;
            --primary-2: #00e6a8;

            --text: #e6ecff;
            --text-light: #9fb3d9;

            --border: rgba(255,255,255,0.08);

            --error: #ff4d6d;
            --success: #2ecc71;

            --shadow: 0 20px 60px rgba(0,0,0,0.6);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            background: radial-gradient(circle at 20% 20%, #0b1a3a, #020617);
            color: var(--text);
        }

        .login-wrapper {
            display: flex;
            width: 95%;
            max-width: 1100px;
            height: 650px;

            border-radius: 20px;
            overflow: hidden;

            box-shadow: var(--shadow);
            animation: fadeIn 0.8s ease;
        }

        /* LEFT PANEL */
        .login-form {
            flex: 1;
            padding: 60px;

            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border-right: 1px solid var(--border);

            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-form h1 {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .login-form .subtitle {
            color: var(--text-light);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            font-size: 0.9rem;
            margin-bottom: 6px;
            display: block;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            font-size: 0.85rem;
        }

        .form-control {
            width: 100%;
            padding: 14px 14px 14px 40px;

            border-radius: 14px;
            border: 1px solid var(--border);

            background: rgba(255,255,255,0.05);
            color: var(--text);

            transition: 0.25s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,210,255,0.2);
        }

        .options {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin: 10px 0 25px;
        }

        .options a {
            color: var(--primary);
            text-decoration: none;
        }

        .options a:hover {
            text-decoration: underline;
        }

        /* BUTTON */
        .btn-login {
            width: 100%;
            padding: 14px;

            border: none;
            border-radius: 14px;

            font-weight: bold;
            cursor: pointer;

            background: linear-gradient(90deg, var(--primary), var(--primary-2));
            color: #001f2b;

            transition: 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,210,255,0.3);
        }

        /* DIVIDER */
        .or {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: var(--text-light);
            font-size: 0.85rem;
        }

        .or::before,
        .or::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .or span {
            margin: 0 10px;
        }

        /* SOCIAL */
        .social-login {
            display: flex;
            gap: 10px;
        }

        .btn-social {
            flex: 1;
            padding: 12px;

            border-radius: 10px;
            border: 1px solid var(--border);

            background: rgba(255,255,255,0.05);
            color: white;

            cursor: pointer;
            transition: 0.25s;
        }

        .btn-social:hover {
            background: rgba(255,255,255,0.12);
        }

        /* FOOTER */
        .footer-links {
            margin-top: 25px;
            font-size: 0.9rem;
        }

        .footer-links a {
            color: var(--primary);
            text-decoration: none;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        /* RIGHT PANEL */
        .welcome-panel {
            flex: 1;
            padding: 60px;

            background: linear-gradient(135deg, #020617, #031633);
            display: flex;
            align-items: center;
        }

        .welcome-content {
            max-width: 420px;
        }

        .welcome-content .brand {
            color: var(--primary);
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .welcome-content h1 {
            font-size: 2.5rem;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        .highlight {
            color: var(--primary);
        }

        .welcome-content p {
            color: var(--text-light);
        }

        /* ALERTS */
        .error-message, .success-message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
        }

        .error-message {
            background: rgba(255, 77, 109, 0.1);
            color: var(--error);
            border-left: 3px solid var(--error);
        }

        .success-message {
            background: rgba(46, 204, 113, 0.1);
            color: var(--success);
            border-left: 3px solid var(--success);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 900px) {
            .welcome-panel {
                display: none;
            }
        }
    </style>
</head>

<body>

<div class="login-wrapper">

    <!-- FORM -->
    <div class="login-form">

        <h1>Bienvenido de vuelta</h1>
        <p class="subtitle">Inicia sesión para continuar</p>

        <form th:action="@{/login}" method="post">

            <div class="form-group">
                <label>Usuario</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="text" name="username" class="form-control"
                           placeholder="Ingresa tu usuario" required autofocus>
                </div>
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" class="form-control"
                           placeholder="Ingresa tu contraseña" required>
                </div>
            </div>

            <div class="options">
                <label><input type="checkbox"> Recordarme</label>
                <a href="#">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="btn-login">
                Iniciar sesión
            </button>
        </form>

        <div th:if="${param.error}" class="error-message">
            Usuario o contraseña incorrectos.
        </div>

        <div th:if="${param.logout}" class="success-message">
            Sesión cerrada exitosamente.
        </div>

        <div class="or"><span>o ingresa con</span></div>

        <div class="social-login">
            <button class="btn-social"><i class="fab fa-facebook-f"></i></button>
            <button class="btn-social"><i class="fab fa-google"></i></button>
            <button class="btn-social"><i class="fab fa-twitter"></i></button>
        </div>

        <div class="footer-links">
            ¿No tienes cuenta?
            <a th:href="@{/usuarios/registro-publico}">Regístrate aquí</a><br>
            <a href="/">Volver a la Página Principal</a>
        </div>

    </div>

    <!-- RIGHT -->
    <div class="welcome-panel">
        <div class="welcome-content">

            <div class="brand">FIT EXPERT</div>

            <h1>
                ENTRENADORES <br>
                <span class="highlight">QUE TRANSFORMAN VIDAS</span>
            </h1>

            

        </div>
    </div>

</div>

</body>
</html>
