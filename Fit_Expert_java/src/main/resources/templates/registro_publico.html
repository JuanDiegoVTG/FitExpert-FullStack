<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registro Pro - FIT EXPERT</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00d2ff; /* Cian vibrante */
            --primary-glow: rgba(0, 210, 255, 0.5);
            --neon-green: #00ff88;
            --error-neon: #ff0055;
            --secondary: #0f172a;
            --secondary-light: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --card-bg: rgba(15, 23, 42, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            padding: 40px;
            border-radius: 28px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 20px var(--primary-glow);
            border: 1px solid var(--border);
            text-align: center;
        }

        /* Stepper */
        .stepper { display: flex; justify-content: space-between; margin-bottom: 35px; position: relative; }
        .stepper::before { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: var(--border); z-index: 1; }
        
        .step-circle {
            width: 40px; height: 40px;
            background: var(--secondary-light);
            border: 2px solid var(--border);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; z-index: 2; transition: var(--transition);
        }
        .step-circle.active { 
            background: var(--primary); 
            border-color: var(--primary); 
            color: var(--secondary);
            box-shadow: 0 0 15px var(--primary);
        }

        .form-step { display: none; animation: fadeIn 0.4s ease; }
        .form-step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .form-group { margin-bottom: 22px; text-align: left; }
        label { display: block; font-size: 0.7rem; color: var(--primary); margin-bottom: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; }

        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); transition: var(--transition); }

        input, select {
            width: 100%; padding: 14px 14px 14px 45px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border); border-radius: 14px;
            color: white; font-size: 1rem; transition: var(--transition);
        }

        select option {
            background-color: var(--secondary-light);
            color: white;
        }

        input:focus, select:focus { 
            border-color: var(--primary); 
            outline: none; 
            background: rgba(255,255,255,0.07);
            box-shadow: 0 0 10px var(--primary-glow);
        }
        input:focus + i, select:focus + i { color: var(--primary); }

        /* Manejo de Errores */
        .error-msg {
            color: #ff4b2b;
            font-size: 0.75rem;
            margin-top: 5px;
            font-weight: 600;
            display: block;
        }

        .alert-error {
            background: rgba(255, 0, 85, 0.1);
            border: 1px solid var(--error-neon);
            color: var(--error-neon);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .input-error {
            border: 2px solid #ff4b2b !important;
            box-shadow: 0 0 10px rgba(255, 75, 43, 0.3);
        }

        .shake-error {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        /* Botones */
        .btn-nav { padding: 12px 24px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: var(--transition); text-transform: uppercase; letter-spacing: 1px; }
        .btn-next { background: var(--primary); color: var(--secondary); width: 100%; box-shadow: 0 4px 15px var(--primary-glow); border: none; font-weight: 800;}
        .btn-prev { background: rgba(255, 255, 255, 0.05); color: #94a3b8; border: 1px solid rgba(255, 255, 255, 0.1); }
        
        .btn-lanzar {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
            text-transform: uppercase;
        }

        .btn-lanzar:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.5);
        }

        .btn-lanzar:disabled {
            background: #475569;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .login-link { margin-top: 25px; display: block; color: var(--text-muted); text-decoration: none; font-size: 0.85rem; }
        .login-link b { color: var(--primary); }
    </style>
</head>
<body>

    <div id="loading-overlay" style="
        display: none; 
        position: fixed; 
        top: 0; left: 0; 
        width: 100%; height: 100%; 
        background: rgba(6, 14, 26, 0.85); 
        backdrop-filter: blur(10px); 
        z-index: 9999; 
        justify-content: center; 
        align-items: center; 
        flex-direction: column;
        color: #ffffff;">
        
        <div style="position: relative; margin-bottom: 25px;">
            <i class="fas fa-spinner fa-spin" style="font-size: 5rem; color: #00D4FF; opacity: 0.8;"></i>
            <i class="fas fa-robot" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2.2rem; color: #6366f1;"></i>
        </div>

        <h2 id="loading-title" style="font-weight: 800; letter-spacing: -0.5px; margin-bottom: 10px; color: #00D4FF; text-align: center; padding: 0 20px;">
            🤖 Iniciando Análisis de Perfil...
        </h2>
        <p id="loading-sub" style="color: #94a3b8; font-size: 0.95rem; font-weight: 500; text-align: center; padding: 0 20px;">
            Nuestra IA está leyendo tu hoja de vida. Esto puede tomar unos segundos.
        </p>
    </div>

<div class="container">
    <header style="margin-bottom: 30px;">
        <h2 style="font-weight: 900; letter-spacing: -1px; font-size: 2.2rem; color: var(--primary);">FIT EXPERT</h2>
        <p style="color: var(--text-muted); font-size: 0.9rem;">Crea tu perfil de alto rendimiento</p>
    </header>

    <form th:action="@{/usuarios/crear-publico}" 
      th:object="${usuarioForm}" 
      method="post" 
      enctype="multipart/form-data" 
      id="registroForm">

    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

    <div th:if="${#fields.hasErrors('global')}" class="alert-error">
        <i class="fas fa-exclamation-triangle"></i> <span th:errors="*{global}"></span>
    </div>

    <div class="stepper">
        <div class="step-circle active" id="s1">1</div>
        <div class="step-circle" id="s2">2</div>
        <div class="step-circle" id="s3">3</div>
    </div>
    
    <div class="form-step active" id="step1">
        <div class="form-group">
            <label>Usuario</label>
            <div class="input-wrapper">
                <i class="fas fa-at"></i>
                <input type="text" th:field="*{userName}" placeholder="Nombre de usuario" required>
            </div>
            <span class="error-msg" th:if="${#fields.hasErrors('userName')}" th:errors="*{userName}" style="display:block; color:red;"></span>
        </div>
        
        <div class="form-group">
            <label>Email Profesional</label>
            <div class="input-wrapper">
                <i class="fas fa-envelope"></i>
                <input type="email" th:field="*{email}" placeholder="correo@ejemplo.com" required>
            </div>
            <span class="error-msg" th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="display:block; color:red;"></span>
        </div>

        <div class="form-group">
            <label>Contraseña Segura</label>
            <div class="input-wrapper">
                <i class="fas fa-key"></i>
                <input type="password" th:field="*{password}" placeholder="••••••••" required>
            </div>
        </div>

        <button type="button" class="btn-nav btn-next" onclick="move(1, 2)">Datos Personales <i class="fas fa-chevron-right"></i></button>
    </div>

    <div class="form-step" id="step2">
        <div class="form-group">
            <label>Nombre y Apellidos</label>
            <div class="input-wrapper" style="display: flex; gap: 10px;">
                <input type="text" th:field="*{nombres}" placeholder="Nombres" required>
                <input type="text" th:field="*{apellidos}" placeholder="Apellidos" required>
            </div>
        </div>

        <div class="row" style="display: flex; gap: 15px; margin-bottom: 22px;">
            <div class="form-group" style="flex: 1;">
                <label>Fecha Nacimiento</label>
                <input type="date" th:field="*{fechaNacimiento}" required>
                <span class="error-msg" th:if="${#fields.hasErrors('fechaNacimiento')}" th:errors="*{fechaNacimiento}" style="display:block; color:red;"></span>
            </div>

            <div class="form-group" style="flex: 1;">
                <label>Sexo Biológico</label>
                <select th:field="*{sexo}" required>
                    <option value="" disabled selected>Elegir...</option>
                    <option value="M">Masc.</option>
                    <option value="F">Fem.</option>
                </select>
            </div>
        </div>

        <div style="display: flex; gap: 10px;">
            <button type="button" class="btn-nav btn-prev" onclick="move(2, 1)">Atrás</button>
            <button type="button" class="btn-nav btn-next" onclick="move(2, 3)">Siguiente <i class="fas fa-chevron-right"></i></button>
        </div>
    </div>

    <div class="form-step" id="step3">
        <div class="form-group">
            <label>¿Cuál es tu perfil?</label>
            <select th:field="*{rolId}" id="rolSelect" required onchange="checkTrainer()">
                <option value="" disabled selected>Selecciona tu rol</option>
                <option value="3">Atleta (Quiero entrenar)</option>
                <option value="2">Entrenador (Busco clientes)</option>
            </select>
        </div>

        <div id="trainerUpload" class="form-group" style="display:none; border: 2px dashed var(--primary); padding: 20px; border-radius: 18px; background: rgba(0, 210, 255, 0.05);">
            <label style="color: var(--neon-green);"><i class="fas fa-file-pdf"></i> Certificación / CV</label>
            <input type="file" id="archivoCv" name="archivoCv" class="form-control" accept="application/pdf">
            
            <span style="display: block; color: var(--text-muted); font-size: 0.75rem; margin-top: 10px;">
                <i class="fas fa-info-circle"></i> Formato PDF. Tamaño máximo permitido: <strong>5 MB</strong>.
            </span>
            <span id="cv-error-msg" class="error-msg" style="display:none;"></span>
        </div>

        <div style="display: flex; gap: 10px;">
            <button type="button" class="btn-nav btn-prev" onclick="move(3, 2)">Atrás</button>
            <button type="submit" id="btn-lanzar" class="btn-lanzar">
                <i class="fas fa-rocket"></i> Lanzar Perfil
            </button>
        </div>
    </div>
</form>

    <a th:href="@{/login}" class="login-link">¿Ya eres parte de la élite? <b>Inicia sesión</b></a>
</div>

<script th:inline="javascript">
function move(from, to) {
    if (to > from) {
        if (!validateStep(from)) {
            const currentStep = document.getElementById('step' + from);
            currentStep.classList.add('shake-error');
            setTimeout(() => currentStep.classList.remove('shake-error'), 500);
            return;
        }
    }

    document.getElementById('step' + from).classList.remove('active');
    document.getElementById('step' + to).classList.add('active');
    
    if (to > from) {
        document.getElementById('s' + to).classList.add('active');
    } else {
        document.getElementById('s' + from).classList.remove('active');
    }
}

function validateStep(stepNumber) {
    const container = document.getElementById('step' + stepNumber);
    const inputs = container.querySelectorAll('input[required], select[required]');
    let isValid = true;

    inputs.forEach(input => {
        input.classList.remove('input-error');
        const formGroup = input.closest('.form-group');
        if(formGroup) {
            const errorSpan = formGroup.querySelector('.error-msg');
            if(errorSpan) errorSpan.style.display = 'none'; // 🔥 LIMPIEZA DE ERRORES VIEJOS
        }
        
        if (!input.value.trim()) {
            showError(input, "Este dato es obligatorio.");
            isValid = false;
        } 
        else if (input.type === 'email') {
            const emailVal = input.value.trim();
            if (!emailVal.includes('@') || !emailVal.includes('.')) {
                showError(input, "El correo no tiene un formato válido.");
                isValid = false;
            }
        }
        else if (input.type === 'date') {
            const fechaNacimiento = new Date(input.value);
            const hoy = new Date();
            let edad = hoy.getFullYear() - fechaNacimiento.getFullYear();
            const mes = hoy.getMonth() - fechaNacimiento.getMonth();
            
            if (mes < 0 || (mes === 0 && hoy.getDate() < fechaNacimiento.getDate())) {
                edad--;
            }

            if (edad < 16) {
                showError(input, "Debes ser mayor de 16 años para unirte a FitExpert.");
                isValid = false;
            } else if (edad > 100) {
                showError(input, "Fecha inválida, parece muy antigua.");
                isValid = false;
            }
        }
    });

    return isValid;
}

// 🔥 ARREGLO DEL CALENDARIO (Usa el id generado por Spring de forma segura)
window.addEventListener('DOMContentLoaded', () => {
    const fechaInput = document.querySelector('input[type="date"]');
    if(fechaInput) {
        const limite = new Date();
        limite.setFullYear(limite.getFullYear() - 16);
        fechaInput.max = limite.toISOString().split("T")[0];
    }
});

function showError(input, message) {
    input.classList.add('input-error');
    const formGroup = input.closest('.form-group');
    if (formGroup) {
        const errorSpan = formGroup.querySelector('.error-msg');
        if (errorSpan) {
            errorSpan.textContent = message;
            errorSpan.style.display = 'block';
            return;
        }
    }
    alert(message);
}

function checkTrainer() {
    var rolElement = document.getElementById("rolSelect");
    if(!rolElement) return;

    var rol = rolElement.value;
    var seccion = document.getElementById("trainerUpload");
    var inputCv = document.getElementById("archivoCv");

    if (rol == "2") { 
        seccion.style.display = "block";
        if (inputCv) inputCv.required = true;
    } else {
        seccion.style.display = "none";
        if (inputCv) {
            inputCv.required = false;
            inputCv.value = ""; 
        }
    }
}

// 🔥 VALIDACIÓN DE TAMAÑO DEL PDF (MÁXIMO 5MB)
document.addEventListener('DOMContentLoaded', function() {
    const inputCv = document.getElementById('archivoCv');
    const MAX_MB = 5; // Límite en Megabytes
    const MAX_BYTES = MAX_MB * 1024 * 1024;

    if(inputCv) {
        inputCv.addEventListener('change', function() {
            const errorSpan = document.getElementById('cv-error-msg');
            const file = this.files[0];
            
            if (file) {
                if (file.size > MAX_BYTES) {
                    const pesoActualMB = (file.size / (1024 * 1024)).toFixed(2);
                    // Mostrar error
                    errorSpan.innerHTML = `<i class="fas fa-times-circle"></i> El archivo pesa ${pesoActualMB}MB. Supera el límite de ${MAX_MB}MB.`;
                    errorSpan.style.display = 'block';
                    
                    // Limpiar el input para que no se envíe al servidor
                    this.value = ''; 
                    
                    // Efecto visual de error
                    const container = document.getElementById('trainerUpload');
                    container.style.borderColor = '#ff4b2b';
                    container.classList.add('shake-error');
                    setTimeout(() => container.classList.remove('shake-error'), 500);
                } else {
                    // Todo correcto, ocultar error
                    errorSpan.style.display = 'none';
                    document.getElementById('trainerUpload').style.borderColor = 'var(--primary)';
                }
            }
        });
    }
});

</script>
</body>
</html>
