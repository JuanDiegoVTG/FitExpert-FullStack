<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout}">
<head>
    <title>Análisis Corporal - FitExpert IA</title>
</head>
<body>

<div th:fragment="content">
    <style>
        .assessment-wrapper { padding: 3rem 1rem; display: flex; justify-content: center; min-height: 80vh; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.8) !important; backdrop-filter: blur(15px); border: 1px solid rgba(0, 210, 255, 0.3) !important; border-radius: 30px; padding: 3rem; max-width: 650px; width: 100%; box-shadow: 0 25px 50px rgba(0,0,0,0.5); color: white; }
        .title-neon { font-size: 2.2rem; font-weight: 900; text-transform: uppercase; margin-bottom: 0.5rem; text-align: center; }
        .section-tag { color: #00ff88; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; margin: 1.5rem 0; border-bottom: 1px solid rgba(0, 255, 136, 0.2); padding-bottom: 8px; }
        .input-group-custom { margin-bottom: 1.5rem; }
        .label-custom { display: block; color: #94a3b8; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; }
        .form-control-fit { width: 100%; background: rgba(15, 23, 42, 0.9) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; border-radius: 15px !important; padding: 14px 15px; color: white !important; font-weight: 600; }
        .btn-sync { background: linear-gradient(45deg, #00d2ff, #00ff88); border: none; color: #0f172a; font-weight: 900; text-transform: uppercase; padding: 1.2rem; border-radius: 18px; width: 100%; cursor: pointer; transition: 0.3s; }
        .btn-sync:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0, 255, 136, 0.4); }
    </style>

    <div class="assessment-wrapper">
        <div class="glass-card">
            <div class="text-center">
                <h1 class="title-neon">ANÁLISIS <span style="color: #00d2ff;">CORPORAL</span></h1>
                <p style="color: #94a3b8; margin-bottom: 2rem;">Algoritmo de Bio-impedancia FitExpert IA</p>
            </div>

            <form id="calcForm">
                <div class="section-tag"><i class="fas fa-sliders-h"></i> Parámetros Vitales</div>
                <div class="row">
                    <div class="col-md-6 input-group-custom">
                        <label class="label-custom">Peso (KG)</label>
                        <input type="number" step="any" name="peso" th:value="${perfil?.peso}" class="form-control-fit" required>
                    </div>
                    <div class="col-md-6 input-group-custom">
                        <label class="label-custom">Estatura (CM)</label>
                        <input type="number" step="any" name="altura" th:value="${perfil?.altura}" class="form-control-fit" required>
                    </div>
                </div>

                <div class="section-tag"><i class="fas fa-tape"></i> Perímetros</div>
                <div class="row">
                    <div class="col-md-4 input-group-custom">
                        <label class="label-custom">Cuello</label>
                        <input type="number" step="any" name="cuello" th:value="${perfil?.cuello}" class="form-control-fit" required>
                    </div>
                    <div class="col-md-4 input-group-custom">
                        <label class="label-custom">Cintura</label>
                        <input type="number" step="any" name="cintura" th:value="${perfil?.cintura}" class="form-control-fit" required>
                    </div>
                    <div class="col-md-4 input-group-custom">
                        <label class="label-custom">Cadera</label>
                        <input type="number" step="any" name="cadera" th:value="${perfil?.cadera}" class="form-control-fit">
                    </div>
                </div>

                <div class="section-tag"><i class="fas fa-fire"></i> Actividad y Género</div>
                <div class="row">
                    <div class="col-md-6 input-group-custom">
                        <label class="label-custom">Nivel de Actividad</label>
                        <select name="nivelActividad" class="form-control-fit" required>
                            <option value="1.2" th:selected="${perfil?.nivelActividad == '1.2'}">Sedentario</option>
                            <option value="1.375" th:selected="${perfil?.nivelActividad == '1.375'}">Ligero</option>
                            <option value="1.55" th:selected="${perfil?.nivelActividad == '1.55'}">Moderado</option>
                            <option value="1.725" th:selected="${perfil?.nivelActividad == '1.725'}">Intenso</option>
                        </select>
                    </div>
                    <div class="col-md-6 input-group-custom">
                        <label class="label-custom">Género</label>
                        <select name="sexo" class="form-control-fit" required>
                            <option value="masculino" th:selected="${perfil?.sexo == 'masculino'}">Masculino</option>
                            <option value="femenino" th:selected="${perfil?.sexo == 'femenino'}">Femenino</option>
                        </select>
                    </div>
                </div>

                <button type="button" class="btn-sync" onclick="calcular()">
                    CALCULAR AHORA <i class="fas fa-chevron-right ms-2"></i>
                </button>
            </form>

            <div id="resultado" style="margin-top:20px; color:white;"></div>
        </div>
    </div>

    <script>
    function calcular() {
        const formData = {
            peso: document.querySelector('[name="peso"]').value,
            altura: document.querySelector('[name="altura"]').value,
            cintura: document.querySelector('[name="cintura"]').value,
            cuello: document.querySelector('[name="cuello"]').value,
            cadera: document.querySelector('[name="cadera"]').value,
            sexo: document.querySelector('[name="sexo"]').value,
            nivel_actividad: document.querySelector('[name="nivelActividad"]').value
        };

        fetch('/api/generar-diagnostico', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(formData)
        })
        .then(response => response.json())
        .then(data => {
            if(data.error) {
                document.getElementById('resultado').innerHTML = `<p style="color:red;">Error: ${data.error}</p>`;
            } else {
                document.getElementById('resultado').innerHTML = `
                    <div style="background:rgba(255,255,255,0.1); padding:20px; border-radius:15px; margin-top:20px;">
                        <h3>Resultados:</h3>
                        <p>IMC: ${data.imc} | Estado: ${data.estado}</p>
                        <p>Grasa Corporal: ${data.grasa_corporal}%</p>
                        <p>Calorías mantenimiento: ${data.mantenimiento}</p>
                        <p><strong>Recomendación IA:</strong> ${data.recomendacion}</p>
                    </div>
                `;
            }
        })
        .catch(error => {
            console.error('Error:', error);
            document.getElementById('resultado').innerHTML = `<p style="color:red;">Error de conexión con la IA.</p>`;
        });
    }
    </script>
</div>
</body>
</html>
