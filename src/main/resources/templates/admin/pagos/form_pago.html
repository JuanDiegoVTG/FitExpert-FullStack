<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:if="${pagoId}">Editar Pago - Fit Expert</title>
    <title th:unless="${pagoId}">Registrar Nuevo Pago - FIT EXPERT</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link rel="stylesheet" th:href="@{/css/estilo.css}">

    <style>
        /* Variables de tema oscuro y colores de Emi-Lite */
        

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 550px;
            border: 1px solid var(--border);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header i { 
            font-size: 2.5rem; 
            color: var(--primary); 
            background: rgba(99, 102, 241, 0.1);
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 15px;
        }

        h2 { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px; }

        .form-group { margin-bottom: 20px; }
        label { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            margin-bottom: 8px; 
            font-weight: 700; 
            color: var(--text-muted); 
            font-size: 0.85rem; 
        }
        label i { color: var(--primary); font-size: 0.9rem; }

        input, select {
            width: 100%;
            padding: 14px 18px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: white;
            font-size: 1rem;
            transition: var(--transition);
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
            background: rgba(30, 41, 59, 0.9);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: var(--primary-dark);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
        }

        .error-msg {
            color: var(--danger);
            font-size: 0.75rem;
            margin-top: 5px;
            font-weight: 600;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            transition: var(--transition);
        }
        .back-link:hover { color: white; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">
            <img th:src="@{/images/logofitexpert.jpeg}" alt="Emi-Lite" style="height:110px; width:120px; display:inline-block; vertical-align:middle;" />
        </div>

        <form th:action="@{/admin/pagos/guardar}" th:object="${pagoForm}" method="post">
            
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" th:field="*{id}" />

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Cliente</label>
                    <select th:field="*{usuario}" required>
                        <option value="" disabled selected>Seleccione...</option>
                        <option th:each="u : ${usuarios}" th:value="${u.id}" th:text="${u.userName}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-dumbbell"></i> Servicio</label>
                    <select th:field="*{servicio}">
                        <option value="">Aporte Libre</option>
                        <option th:each="s : ${servicios}" th:value="${s.id}" th:text="${s.nombre}"></option>
                    </select>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label><i class="fas fa-coins"></i> Monto (COP)</label>
                    <input type="number" th:field="*{monto}" required placeholder="0">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-wallet"></i> Método</label>
                    <select th:field="*{metodoPago}" required>
                        <option value="" disabled selected>Elegir...</option>
                        <option value="EFECTIVO">EFECTIVO</option>
                        <option value="TRANSFERENCIA">TRANSFERENCIA</option>
                        <option value="WOMPI">WOMPI</option>
                    </select>
                    <p class="error-msg" th:if="${#fields.hasErrors('metodoPago')}" th:errors="*{metodoPago}"></p>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label><i class="fas fa-info-circle"></i> Estado</label>
                    <select th:field="*{estado}">
                        <option value="PENDIENTE">PENDIENTE</option>
                        <option value="COMPLETADO">COMPLETADO</option>
                        <option value="FALLIDO">FALLIDO</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-barcode"></i> Referencia</label>
                    <input type="text" th:field="*{referenciaPago}" placeholder="Opcional">
                </div>
            </div>

            <button type="submit" class="btn-submit">
                <i class="fas fa-save"></i> 
                <span th:text="${pagoForm.id != null ? 'Actualizar Pago' : 'Confirmar Registro'}"></span>
            </button>
        </form>

        <div class="footer-links">
            <a href="/admin/pagos" class="back-link"><i class="fas fa-arrow-left"></i> Volver al historial</a>
        </div>
    </div>

</body>
</html>
