<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Ver Servicios - FIT EXPERT</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="text/javascript" src="https://checkout.wompi.co/widget.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/estilo.css}">
</head>

<body class="vista-servicios">
    <div class="container">
        <header class="header-section">
            <div class="logo">
                <img th:src="@{/images/logofitexpert.jpeg}" alt="FIT EXPERT" style="height:110px; width:auto;" />
            </div>
            <h2>Servicios Disponibles</h2>
        </header>

        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Descripción</th>
                    <th>Duración</th>
                    <th>Precio</th>
                    <th style="text-align: center;">Acción</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="servicio : ${servicios}">
                    <td th:text="${servicio.nombre}" style="font-weight: 700;"></td>
                    <td th:text="${servicio.descripcion}" style="color: var(--text-muted); font-size: 0.9rem;"></td>
                    <td th:text="${servicio.duracionMinutos + ' min'}"></td>
                    <td class="price-tag" style="font-weight: 800; color: #10b981;" 
                        th:text="'$' + ${#numbers.formatDecimal(servicio.precio, 1, 0)}"></td>
                    <td style="text-align: center;">
                        <a th:href="@{/cliente/pagos}" class="btn-pay" style="text-decoration: none; background: #009ee3; color:white; padding: 8px 15px; border-radius: 8px; font-size: 0.8rem;">
                             Ver en Mis Pagos
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>

        <footer class="footer-actions" style="margin-top: 30px; display: flex; justify-content: space-between;">
            <a th:href="@{/dashboard}" class="back-btn"><i class="fas fa-arrow-left"></i> Volver al Panel</a>
            <form th:action="@{/logout}" method="post">
                <button type="submit" style="background:none; border:none; color:var(--danger); cursor:pointer; font-weight:600;">
                    <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                </button>
            </form>
        </footer>
    </div>
</body>
</html>
