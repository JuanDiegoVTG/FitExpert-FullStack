<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login | FIT EXPERT</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --primary: #3169B2;
            --primary-dark: #093E82;
            --secondary: #0B1F3A;
            --secondary-light: #122B52;
            
            --accent: #0D52AB;
            --accent-dark: #093E82;

            --text: #EAF2FB;
            --text-light: #AFC6E9;

            --card-bg: rgba(18, 43, 82, 0.9);
            --border: #1E3A6D;

            --success: #28A745;
            --error: #FF4757;

            --shadow: 0 8px 25px rgba(9, 62, 130, 0.35);
            --transition: all 0.3s ease;

            --gradient-primary: linear-gradient(135deg, #5382BE 0%, #0D52AB 100%);
            --gradient-dark: linear-gradient(135deg, #0B1F3A 0%, #122B52 100%);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: url('https://source.unsplash.com/1600x900/?workspace,light') no-repeat center center fixed;
            background-size: cover;
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-wrapper {
            display: flex;
            width: 90%;
            max-width: 1000px;
            height: 600px;
            box-shadow: var(--shadow);
            border-radius: 12px;
            overflow: hidden;
        }

        /* Panel izquierdo: formulario */
        .login-form {
            flex: 1;
            background:
            linear-gradient(
                        135deg,rgba(30, 47, 95, 0.905),rgba(49, 76, 158, 0.79)
            ); /* Fondo de la tarjeta */
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-form h2 {
            margin-bottom: 10px;
            color: var(--secondary);
        }

        .login-form p {
            margin-bottom: 20px;
            color: var(--secondary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text);
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            padding-left: 15px; 
            background: var(--secondary-light);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 1rem;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
        }

        .options {
            display: flex;
            justify-content: space-between;
            font-size: 0.9em;
            margin-bottom: 20px;
        }

        .options a {
            color: var(--secondary);
            text-decoration: none;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            background: var(--primary-dark);
            box-shadow: 0 5px 15px rgba(49, 105, 178, 0.4);
        }

        .or {
            text-align: center;
            margin: 20px 0;
            color: var(--secondary);
        }

        .social-login {
            display: flex;
            justify-content: space-around;
        }

        .btn-social {
            flex: 1;
            margin: 0 5px;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: #fff;
        }

        .facebook { background: #3b5998; }
        .google { background: #db4437; }
        .twitter { background: #1da1f2; }

        /* Panel derecho: bienvenida */
        .welcome-panel {
            flex: 1;
            position: relative;
            background: url('/images/klipartz1.png') no-repeat center center;
            background-size: cover;
            color: var(--text);
            padding: 50px;
            display: flex;
            justify-content: center;
        }


        .welcome-panel h2 {
            font-size: 2em;
            margin-bottom: 20px;
            color: var(--primary);
        }

        .welcome-panel p {
            font-size: 1.1em;
            max-width: 400px;
            color: var(--text-light);
        }

        .welcome-panel::before {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(34, 79, 138, 0.6); /* overlay translúcido */
        backdrop-filter: blur(4px);        /* difuminado */
        }

        .welcome-content {
        position: relative;
        z-index: 1; /* asegura que el texto quede encima */
        text-align: center;
        }

        .error-message {
            background: rgba(255, 71, 87, 0.1);
            color: var(--error);
            padding: 10px;
            border-radius: 6px;
            margin-top: 15px;
            text-align: center;
            border-left: 4px solid var(--error);
        }

        .success-message {
            background: rgba(40, 167, 69, 0.1);
            color: var(--success);
            padding: 10px;
            border-radius: 6px;
            margin-top: 15px;
            text-align: center;
            border-left: 4px solid var(--success);
        }

        .footer-links a {
            color: var(--text-light); /* azul claro */
            text-decoration: none;
        }
        

        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: var(--text-light); /* Color morado para el enlace */
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
            font-size: 0.95rem;
        }

        .back-link:hover {
            text-decoration: underline;
            color: var(--); /* Morado más claro al hover */
        }
        

    </style>
</head>
<body>
    <div class="login-wrapper">
        <!-- Formulario -->
        <div class="login-form">
            <h2>Iniciar Sesion</h2>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" class="form-control" placeholder="Ingresa tu usuario" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="Ingresa tu contraseña" required>
                </div>

                <div class="options">
                    <label><input type="checkbox"> Recordarme</label>
                    <a href="#">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn-login">LOGIN</button>
            </form>

            <!-- Mensajes -->
            <div th:if="${param.error}" class="error-message">Usuario o contraseña incorrectos.</div>
            <div th:if="${param.logout}" class="success-message">Sesión cerrada exitosamente.</div>

            <p class="or">ingresa con: </p>
            <div class="social-login">
                <button class="btn-social facebook">Facebook</button>
                <button class="btn-social google">Google</button>
                <button class="btn-social twitter">Twitter</button>

            </div>

            <div class="footer-links">
                <p>¿No tienes cuenta? <a th:href="@{/usuarios/registro-publico}">Regístrate aquí </a>
                <a href="/" class="back-link">Volver a la Página Principal</a></p>
                
            </div> 
        </div>

        <!-- Panel de bienvenida -->
        <div class="welcome-panel">
            <div class="Welcome-content"></div>
            
        </div>
        
    </div>

</body>
</html>
